{{- if include "stackstate-k8s-agent.k8sResourceCollector.enabled" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-k8s-resource-collector-config
  labels:
{{ include "stackstate-k8s-agent.labels" . | indent 4 }}
{{ include "stackstate-k8s-agent.global.extraLabels" . | indent 4 }}
    app.kubernetes.io/component: k8s-resource-collector
  annotations:
{{ include "stackstate-k8s-agent.global.extraAnnotations" . | indent 4 }}
data:
  config.yaml: |
    receivers:
      # K8s Resource Receiver - dynamically discovers CRDs and watches custom resources
      k8sresource:
        auth_type: serviceAccount
        cluster_name: {{ .Values.stackstate.cluster.name | quote }}
        snapshot_interval: {{ .Values.k8sResourceCollector.crdDiscovery.snapshotInterval }}
        discovery_mode: {{ .Values.k8sResourceCollector.crdDiscovery.discoveryMode }}
{{- if eq .Values.k8sResourceCollector.crdDiscovery.discoveryMode "api_groups" }}
{{- $includes := list }}
{{- range $pattern, $enabled := .Values.k8sResourceCollector.crdDiscovery.apiGroupFilters.include }}
{{- if $enabled }}{{ $includes = append $includes $pattern }}{{ end }}
{{- end }}
{{- if not $includes }}
{{- fail "k8sResourceCollector.crdDiscovery.apiGroupFilters.include must have at least one truthy entry when discoveryMode is 'api_groups' (e.g. \"*\": true)" }}
{{- end }}
        crd_api_group_filters:
          include:
{{- range $includes }}
            - {{ . | quote }}
{{- end }}
{{- $excludes := list }}
{{- range $pattern, $enabled := .Values.k8sResourceCollector.crdDiscovery.apiGroupFilters.exclude }}
{{- if $enabled }}{{ $excludes = append $excludes $pattern }}{{ end }}
{{- end }}
{{- if $excludes }}
          exclude:
{{- range $excludes }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- end }}
        peer_sync_port: {{ .Values.k8sResourceCollector.peerSync.port }}
{{- if .Values.k8sResourceCollector.leaderElection.enabled }}
        peer_sync_dns: {{ include "stackstate-k8s-agent.k8sResourceCollector.peerSync.dns" . | quote }}
        k8s_leader_elector: k8s_leader_elector
{{- end }}
{{- $objects := dict }}
{{- range $name, $obj := .Values.k8sResourceCollector.objects }}
{{- if $obj }}{{ $_ := set $objects $name $obj }}{{ end }}
{{- end }}
{{- if $objects }}
        objects:
{{- range $name, $obj := $objects }}
          - name: {{ $name | quote }}
            group: {{ $obj.group | default "" | quote }}
{{- if $obj.version }}
            version: {{ $obj.version | quote }}
{{- end }}
{{- if $obj.namespaces }}
            namespaces:
{{- range $obj.namespaces }}
              - {{ . | quote }}
{{- end }}
{{- end }}
{{- if $obj.labelSelector }}
            label_selector: {{ $obj.labelSelector | quote }}
{{- end }}
{{- if $obj.fieldSelector }}
            field_selector: {{ $obj.fieldSelector | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- $denied := dict }}
{{- range $name, $obj := .Values.k8sResourceCollector.deniedObjects }}
{{- if $obj }}{{ $_ := set $denied $name $obj }}{{ end }}
{{- end }}
{{- if $denied }}
        denied_objects:
{{- range $name, $obj := $denied }}
          - name: {{ $name | quote }}
            group: {{ $obj.group | default "" | quote }}
{{- end }}
{{- end }}

{{- $exporterName := ternary "otlp/suse-observability" "otlp_http/suse-observability" (eq (include "stackstate-k8s-agent.platform.otlp.useGrpc" .) "true") }}
    exporters:
      # Send to SUSE Observability platform
      {{ $exporterName }}:
        auth:
          authenticator: bearertokenauth
        endpoint: ${PLATFORM_OTLP_ENDPOINT}
        tls:
          insecure_skip_verify: ${SKIP_SSL_VALIDATION}
        compression: gzip
        timeout: 30s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      bearertokenauth:
        scheme: SUSEObservability
        token: "${STS_API_KEY}"
{{- if .Values.k8sResourceCollector.leaderElection.enabled }}
      k8s_leader_elector:
        auth_type: serviceAccount
        lease_name: {{ .Values.k8sResourceCollector.leaderElection.leaseName | quote }}
        lease_namespace: ${POD_NAMESPACE}
        lease_duration: {{ .Values.k8sResourceCollector.leaderElection.leaseDuration }}
        renew_deadline: {{ .Values.k8sResourceCollector.leaderElection.renewDeadline }}
        retry_period: {{ .Values.k8sResourceCollector.leaderElection.retryPeriod }}
{{- end }}

    service:
      telemetry:
        logs:
          level: {{ .Values.k8sResourceCollector.logLevel }}
      extensions: [health_check, bearertokenauth{{ if .Values.k8sResourceCollector.leaderElection.enabled }}, k8s_leader_elector{{ end }}]
      pipelines:
        # Kubernetes resource discovery - real-time watch of CRDs and custom resources
        logs/k8s-resource:
          receivers: [k8sresource]
          processors: []
          exporters: [{{ $exporterName }}]
{{- end }}
