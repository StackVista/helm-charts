{{- if and (include "stackstate-k8s-agent.k8sCrdCollector.enabled" .) .Values.k8sCrdCollector.leaderElection.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-k8s-crd-collector-headless
  labels:
{{ include "stackstate-k8s-agent.labels" . | indent 4 }}
{{ include "stackstate-k8s-agent.global.extraLabels" . | indent 4 }}
    app.kubernetes.io/component: k8s-crd-collector
  annotations:
{{ include "stackstate-k8s-agent.global.extraAnnotations" . | indent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.k8sCrdCollector.peerSync.port }}
      targetPort: {{ .Values.k8sCrdCollector.peerSync.port }}
      protocol: TCP
      name: peer-sync
  selector:
    app.kubernetes.io/component: k8s-crd-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: {{ include "stackstate-k8s-agent.name" . }}
{{- end }}
