stackstate:
  apiKey: test-api-key
  cluster:
    name: test-cluster
  url: https://my-suse-observability-instance.com/receiver

# Invalid: HTTP endpoint must include https:// scheme
k8sCrdCollector:
  enabled: true
  platformOtlpEndpoint: "otlp-http-my-instance.example.com"
  crdDiscovery:
    interval: 15m
    discoveryMode: api_groups
    apiGroupFilters:
      include:
        - "*"
      exclude: []
  rbac:
    useWildcard: true
