stackstate:
  apiKey: test-api-key
  cluster:
    name: test-cluster
  url: https://my-suse-observability-instance.com/receiver

# Enable cluster collector with restricted RBAC (specific API groups)
k8sCrdCollector:
  enabled: true
  crdDiscovery:
    snapshotInterval: 5m
    discoveryMode: api_groups
    apiGroupFilters:
      include:
        - "policies.kubewarden.io"
        - "longhorn.io"
        - "*.suse.com"
      exclude:
        - "test.suse.com"
  rbac:
    useWildcard: false
    apiGroups:
      - "policies.kubewarden.io"
      - "longhorn.io"
      - "cert-manager.io"
