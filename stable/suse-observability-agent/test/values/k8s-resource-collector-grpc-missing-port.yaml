stackstate:
  apiKey: test-api-key
  cluster:
    name: test-cluster
  url: https://my-suse-observability-instance.com/receiver

# Invalid: a host:port endpoint without scheme is treated as gRPC and must include :443.
k8sResourceCollector:
  enabled: true
  platformOtlpEndpoint: "otlp-my-instance.example.com"
  crdDiscovery:
    interval: 15m
    discoveryMode: api_groups
    apiGroupFilters:
      include:
        - "*"
      exclude: []
  rbac:
    useWildcard: true
