stackstate:
  apiKey: test-api-key
  cluster:
    name: test-cluster
  url: https://my-suse-observability-instance.com

# Enable cluster collector with gRPC protocol via dedicated OTLP ingress.
# Protocol is inferred from the endpoint shape (no http(s):// scheme → gRPC).
k8sResourceCollector:
  enabled: true
  platformOtlpEndpoint: "otlp-my-suse-observability-instance.com:443"
  crdDiscovery:
    interval: 15m
    discoveryMode: api_groups
    apiGroupFilters:
      include:
        "*": true
      exclude: {}
  rbac:
    useWildcard: true
