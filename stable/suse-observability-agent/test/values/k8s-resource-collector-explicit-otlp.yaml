stackstate:
  apiKey: test-api-key
  cluster:
    name: test-cluster
  url: https://my-suse-observability-instance.com/receiver

# Enable cluster collector with explicit OTLP endpoint override
k8sResourceCollector:
  enabled: true
  platformOtlpEndpoint: "https://custom-otlp.example.com:4318"
  crdDiscovery:
    interval: 15m
    discoveryMode: all
  rbac:
    useWildcard: true
