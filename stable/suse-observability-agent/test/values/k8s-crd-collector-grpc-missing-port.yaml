stackstate:
  apiKey: test-api-key
  cluster:
    name: test-cluster
  url: https://my-suse-observability-instance.com/receiver

# Invalid: gRPC endpoint must include :443 port
k8sCrdCollector:
  enabled: true
  otlpProtocol: "grpc"
  platformOtlpEndpoint: "otlp-my-instance.example.com"
  crdDiscovery:
    interval: 15m
    discoveryMode: api_groups
    apiGroupFilters:
      include:
        - "*"
      exclude: []
  rbac:
    useWildcard: true
