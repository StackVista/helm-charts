stackstate:
  apiKey: test-api-key
  cluster:
    name: test-cluster
  url: https://my-suse-observability-instance.com/receiver

# All integration flags explicitly disabled — used by the "disabled" test to
# verify that no integration groups appear regardless of chart defaults.
k8sResourceCollector:
  enabled: true
  crdDiscovery:
    discoveryMode: api_groups
    apiGroupFilters:
      include:
        "*": true
  rbac:
    useWildcard: true
  integrations:
    suseRuntimeEnforcer: false
    suseAdmissionController: false
    suseVirtualization: false
    suseSbomScanner: false
