# Integration overlay for the SUSE Runtime Enforcer stackpack.
#
# Pre-configures the k8sResourceCollector with the API groups consumed by the
# SUSE Runtime Enforcer stackpack's component- and relation-mappings.
#
# Usage — enable the flag in your values:
#   k8sResourceCollector:
#     integrations:
#       suseRuntimeEnforcer: true
k8sResourceCollector:
  crdDiscovery:
    apiGroupFilters:
      include:
        "security.rancher.io": true
  rbac:
    # Only consulted when k8sResourceCollector.rbac.useWildcard is false.
    # Listed here so restricted-RBAC deployments still grant access to the
    # groups this stackpack needs.
    crdApiGroups:
      "security.rancher.io": true
