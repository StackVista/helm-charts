apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "common.fullname.short" . }}-sa
  namespace: {{ .Release.Namespace }}
  annotations:
    stackstate.io/roles: stackstate-aad
{{- if .Values.image.pullSecretName }}
imagePullSecrets:
- name: {{ .Values.image.pullSecretName }}
{{- else if .Values.image.pullSecretUsername }}
imagePullSecrets:
- name: {{ template "common.fullname.short" . }}-pull-secret
{{- end }}
{{- if eq .Values.stackstate.authType "token" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stackstate-aad
rules:
- apiGroups: [""]
  resources: ["ping"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stackstate-aad
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ template "common.fullname.short" . }}-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: stackstate-aad
  apiGroup: rbac.authorization.k8s.io
{{- if (index .Values "cluster-role" "enabled") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "common.fullname.cluster.unique" . }}-aad-authentication
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ template "common.fullname.short" . }}-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
{{- end }}
{{- end }}
