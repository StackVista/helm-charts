{{- define "stackstate.s3proxy.secret-extra-env" -}}
metadata:
  name: {{ include "stackstate.s3proxy.fullname" . }}-extra-env
  labels:
    app.kubernetes.io/name: s3proxy
    app.kubernetes.io/component: s3proxy
    app.kubernetes.io/part-of: suse-observability
    {{- include "suse-observability.labels.global" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.s3proxy.extraEnv.secret }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end -}}

{{- if .Values.s3proxy.extraEnv.secret }}
{{- $commonSecret := fromYaml (include "common.secret" .) -}}
{{- $s3proxySecret := fromYaml (include "stackstate.s3proxy.secret-extra-env" .) -}}
{{- toYaml (merge $s3proxySecret $commonSecret) -}}
{{- end }}
