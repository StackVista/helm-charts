{{- define "s3proxy.servicemonitor" -}}
metadata:
  labels:
    app.kubernetes.io/component: s3proxy
  {{- with .Values.s3proxy.metrics.servicemonitor.additionalLabels }}
    {{ toYaml . | nindent 4 }}
  {{- end }}
  name: {{ template "common.fullname.short" . }}-s3proxy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: s3proxy
  {{ include "s3proxy.servicemonitor.extraLabels" . | nindent 2 }}
{{- end -}}

{{- if ( and .Values.s3proxy.metrics.enabled .Values.s3proxy.metrics.servicemonitor.enabled ) }}
{{- $commonServiceMonitor := fromYaml (include "common.servicemonitor" .) -}}
{{- $s3proxyServiceMonitor := fromYaml (include "s3proxy.servicemonitor" .) -}}
{{- toYaml (merge $s3proxyServiceMonitor $commonServiceMonitor) -}}
{{- end -}}
