{{- define "stackstate.s3proxy.serviceaccount" -}}
metadata:
  name: {{ include "stackstate.s3proxy.serviceAccountName" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: s3proxy
    app.kubernetes.io/component: s3proxy
    app.kubernetes.io/part-of: suse-observability
    {{- include "suse-observability.labels.global" . | nindent 4 }}
  {{- $annotations := include "stackstate.s3proxy.serviceAccount.annotations" . -}}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
{{- end -}}

{{- if eq (include "stackstate.s3proxy.serviceAccount.create" .) "true" -}}
{{- $commonServiceAccount := fromYaml (include "common.serviceaccount" .) -}}
{{- $s3proxyServiceAccount := fromYaml (include "stackstate.s3proxy.serviceaccount" .) -}}
{{- toYaml (merge $s3proxyServiceAccount $commonServiceAccount) -}}
{{- end -}}
