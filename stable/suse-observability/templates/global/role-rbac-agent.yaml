{{- define "stackstate.role.rbac-agent" -}}
metadata:
  name: {{ template "stackstate.rbacAgent.roleName" . }}
  labels:
    app.kubernetes.io/component: rbac-agent
rules:
  - apiGroups: [""]
    resources: ["ping"]
    verbs: ["get"]
{{- end -}}

{{- if .Values.stackstate.k8sAuthorization.enabled }}
{{- $commonRole := fromYaml (include "common.role" .) -}}
{{- $rbacAgentRole := fromYaml (include "stackstate.role.rbac-agent" .) -}}
{{- toYaml (merge $rbacAgentRole $commonRole) -}}
{{- end }}
