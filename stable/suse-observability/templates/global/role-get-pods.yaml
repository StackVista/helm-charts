{{- define "stackstate.role.get-pods" -}}
metadata:
  name: {{ template "common.fullname.short" . }}-get-pods
  labels:
    app.kubernetes.io/component: server
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
{{- end -}}

{{- $commonRole := fromYaml (include "common.role" .) -}}
{{- $getPodsRole := fromYaml (include "stackstate.role.get-pods" .) -}}
{{- toYaml (merge $getPodsRole $commonRole) -}}
