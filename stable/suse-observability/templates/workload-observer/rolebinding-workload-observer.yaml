{{- define "stackstate.rolebinding.workload-observer" -}}
metadata:
  name: {{ include "namePrefix" . }}-workload-observer
roleRef:
  kind: Role
  name: {{ include "namePrefix" . }}-workload-observer
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: {{ include "namePrefix" . }}-workload-observer
{{- end -}}

{{- if .Values.stackstate.components.workloadObserver.enabled }}
{{- $commonRoleBinding := fromYaml (include "common.rolebinding" .) -}}
{{- $woRoleBinding := fromYaml (include "stackstate.rolebinding.workload-observer" .) -}}
{{- toYaml (merge $woRoleBinding $commonRoleBinding) -}}
{{- end }}
