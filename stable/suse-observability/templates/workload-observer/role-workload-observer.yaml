{{- define "stackstate.role.workload-observer" -}}
metadata:
  name: {{ include "namePrefix" . }}-workload-observer
  labels:
    app.kubernetes.io/component: workload-observer
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "list", "watch"]
{{- end -}}

{{- if .Values.stackstate.components.workloadObserver.enabled }}
{{- $commonRole := fromYaml (include "common.role" .) -}}
{{- $woRole := fromYaml (include "stackstate.role.workload-observer" .) -}}
{{- toYaml (merge $woRole $commonRole) -}}
{{- end }}
