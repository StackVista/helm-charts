{{- define "stackstate.mcp.serviceaccount" -}}
metadata:
  name: {{ template "stackstate.mcp.fullname" . }}
  labels:
    app.kubernetes.io/component: mcp
{{- end -}}

{{- if .Values.ai.assistant.enabled }}
{{- $commonServiceAccount := fromYaml (include "common.serviceaccount" .) -}}
{{- $stsstackstateMcpServiceAccount := fromYaml (include "stackstate.mcp.serviceaccount" .) -}}
{{- toYaml (merge $stsstackstateMcpServiceAccount $commonServiceAccount) -}}
{{- end -}}
