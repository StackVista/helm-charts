{{- define "stackstate.mcp.secret" -}}
metadata:
  name: {{ template "stackstate.mcp.fullname" . }}
data:
{{- range $key, $value := .Values.stackstate.components.mcp.extraEnv.secret }}
  {{ $key }}: {{ $value | b64enc | quote }}
{{- end }}
{{- end -}}

{{- if .Values.ai.assistant.enabled }}
{{- if .Values.stackstate.components.mcp.extraEnv.secret -}}
{{- $commonSecret := fromYaml (include "common.secret" .) -}}
{{- $stackstateMcpSecret := fromYaml (include "stackstate.mcp.secret" .) -}}
{{- toYaml (merge $stackstateMcpSecret $commonSecret) -}}
{{- end -}}
{{- end }}
