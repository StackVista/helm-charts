{{- define "stackstate.ai-assistant.serviceaccount" -}}
metadata:
  name: {{ template "stackstate.ai-assistant.fullname" . }}
  annotations:
    {{- with .Values.stackstate.components.aiAssistant.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    app.kubernetes.io/component: ai-assistant
{{- end -}}

{{- if .Values.ai.assistant.enabled }}
{{- $commonServiceAccount := fromYaml (include "common.serviceaccount" .) -}}
{{- $aiAssistantServiceAccount := fromYaml (include "stackstate.ai-assistant.serviceaccount" .) -}}
{{- toYaml (merge $aiAssistantServiceAccount $commonServiceAccount) -}}
{{- end -}}
