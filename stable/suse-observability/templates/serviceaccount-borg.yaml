{{- define "stackstate.borg.serviceaccount" -}}
metadata:
  name: {{ template "stackstate.borg.fullname" . }}
  annotations:
    {{- with .Values.stackstate.components.borg.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    app.kubernetes.io/component: borg
{{- end -}}

{{- if .Values.ai.assistant.enabled }}
{{- $commonServiceAccount := fromYaml (include "common.serviceaccount" .) -}}
{{- $borgServiceAccount := fromYaml (include "stackstate.borg.serviceaccount" .) -}}
{{- toYaml (merge $borgServiceAccount $commonServiceAccount) -}}
{{- end -}}
