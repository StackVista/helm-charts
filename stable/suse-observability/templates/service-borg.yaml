{{- define "stackstate.borg.service" -}}
metadata:
  name: {{ template "stackstate.borg.fullname" . }}
  labels:
    app.kubernetes.io/component: borg
spec:
  ports:
    - name: http
      port: {{ .Values.stackstate.components.borg.service.port }}
      protocol: TCP
      targetPort: http
  selector:
    app.kubernetes.io/component: borg
{{- end -}}

{{- if .Values.ai.assistant.enabled }}
{{- $commonService := fromYaml (include "common.service" .) -}}
{{- $borgService := fromYaml (include "stackstate.borg.service" .) -}}
{{- toYaml (merge $borgService $commonService) -}}
{{- end }}
