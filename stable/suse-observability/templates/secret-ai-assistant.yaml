{{- define "stackstate.ai-assistant.secret" -}}
metadata:
  name: {{ template "stackstate.ai-assistant.fullname" . }}
{{- $provider := default "bedrock" .Values.ai.assistant.provider | lower -}}
{{- $additionalSecrets := dict -}}
{{- if eq $provider "anthropic" -}}
{{- $_ := set $additionalSecrets "ANTHROPIC_API_KEY" (required "ai.assistant.anthropic.apiKey must be set when ai.assistant.provider=anthropic" .Values.ai.assistant.anthropic.apiKey) -}}
{{- end -}}
{{- include "stackstate.service.secret.data" (dict "service" .Values.stackstate.components.aiAssistant "context" $ "additionalSecrets" $additionalSecrets) | nindent 0 -}}
{{- end -}}

{{- if and .Values.ai.assistant.enabled (or .Values.stackstate.components.aiAssistant.extraEnv.secret (eq (default "bedrock" .Values.ai.assistant.provider | lower) "anthropic")) -}}
{{- $commonSecret := fromYaml (include "common.secret" .) -}}
{{- $stackstateAiAssistantSecret := fromYaml (include "stackstate.ai-assistant.secret" .) -}}
{{- toYaml (merge $stackstateAiAssistantSecret $commonSecret) -}}
{{- end -}}
