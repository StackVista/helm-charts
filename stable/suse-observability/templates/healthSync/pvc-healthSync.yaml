{{- define "stackstate.healthSync.txlog.persistentvolumeclaim" -}}
metadata:
  name: {{ template "common.fullname.short" . }}-health-sync-txlog
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ include "suse-observability.features.get" (dict "key" "storeTransactionLogsToPVC.volumeSize" "context" .) | trim }}
{{- $storageClass := include "suse-observability.features.get" (dict "key" "storeTransactionLogsToPVC.storageClass" "context" .) | trim }}
{{- if and $storageClass (ne $storageClass "<no value>") }}
  storageClassName: {{ $storageClass }}
{{- end }}
{{- end -}}

{{- define "stackstate.healthSync.tmp.persistentvolumeclaim" -}}
metadata:
  name: {{ template "common.fullname.short" . }}-health-sync-tmp
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.stackstate.components.healthSync.tmpToPVC.volumeSize }}
  {{ include "common.storage.class" ( dict "persistence" .Values.stackstate.components.healthSync.tmpToPVC "global" .Values.global) | nindent 2 }}
{{- end -}}

{{- if and (include "suse-observability.features.enabled" (dict "key" "storeTransactionLogsToPVC.enabled" "context" .)) (include "suse-observability.features.enabled" (dict "key" "server.split" "context" .)) }}
{{- $commonPVC := fromYaml (include "common.persistentvolumeclaim" .) -}}
{{- $txlogPVC := fromYaml (include "stackstate.healthSync.txlog.persistentvolumeclaim" .) -}}
{{- toYaml (merge $txlogPVC $commonPVC) -}}
{{- end -}}

{{- if and .Values.stackstate.components.healthSync.tmpToPVC (include "suse-observability.features.enabled" (dict "key" "server.split" "context" .)) }}
---
{{ $commonPVC := fromYaml (include "common.persistentvolumeclaim" .) -}}
{{- $tmpPVC := fromYaml (include "stackstate.healthSync.tmp.persistentvolumeclaim" .) -}}
{{- toYaml (merge $tmpPVC $commonPVC) }}
{{- end -}}
