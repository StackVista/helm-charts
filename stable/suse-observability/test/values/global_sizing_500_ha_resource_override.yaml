global:
  imageRegistry: "my.registry.com"
  suseObservability:
    receiverApiKey: "test-key"
    pullSecret:
      username: "test"
      password: "secret"
    sizing:
      profile: "500-ha"
    license: "test-license-key"
    baseUrl: "https://test.example.com"
    adminPassword: "$2b$10$N9qo8uLOickgx2ZMRZoMye.IUIrCxGvz9/6pN.XMlqL9hzTgDaPGy"

pull-secret:
  enabled: false

stackstate:
  components:
    all:
      metricStore:
        remoteWriteEndpoint: "test-$vmInstance:8148"
        queryApiEndpoint: "test:8148"
    api:
      resources:
        limits:
          memory: "12Gi"
          cpu: "8000m"
        requests:
          memory: "12Gi"
          cpu: "4000m"
    checks:
      resources:
        limits:
          memory: "10Gi"
    state:
      resources:
        limits:
          memory: "10Gi"
    server:
      java:
        trustStorePassword: "secretTrustStorePassword"

kafka:
  resources:
    limits:
      memory: "8Gi"
      cpu: "8"
    requests:
      memory: "8Gi"
      cpu: "4"

anomaly-detection:
  enabled: false
