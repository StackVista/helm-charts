global:
  imageRegistry: "my.registry.com"
  suseObservability:
    receiverApiKey: "test-key"
    pullSecret:
      username: "test"
      password: "secret"
    sizing:
      profile: "150-ha"
    license: "test-license-key"
    baseUrl: "https://test.example.com"
    adminPassword: "$2b$10$N9qo8uLOickgx2ZMRZoMye.IUIrCxGvz9/6pN.XMlqL9hzTgDaPGy"

pull-secret:
  enabled: false

stackstate:
  components:
    all:
      metricStore:
        remoteWriteEndpoint: "test-$vmInstance:8148"
        queryApiEndpoint: "test:8148"
    server:
      java:
        trustStorePassword: "secretTrustStorePassword"

# User storage overrides that should win over sizing profile
clickhouse:
  persistence:
    size: 500Gi

elasticsearch:
  replicas: 5
  esJavaOpts: "-Xmx8g -Xms8g -Des.allow_insecure_settings=true"
  volumeClaimTemplate:
    resources:
      requests:
        storage: 400Gi

kafka:
  persistence:
    size: 200Gi

zookeeper:
  persistence:
    size: 16Gi

hbase:
  stackgraph:
    persistence:
      size: 500Gi
  hdfs:
    datanode:
      persistence:
        size: 500Gi

victoria-metrics-0:
  server:
    persistentVolume:
      size: 500Gi
    retentionPeriod: 6

victoria-metrics-1:
  server:
    persistentVolume:
      size: 500Gi
    retentionPeriod: 6

anomaly-detection:
  enabled: false
