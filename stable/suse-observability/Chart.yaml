apiVersion: v2
appVersion: 7.0.0-snapshot.20260602192428-master-6ef9248
version: 2.10.2-pre.26
description: Helm chart for SUSE Observability
keywords:
  - kubernetes
  - observability
  - suse
home: https://gitlab.com/stackvista/stackstate.git
icon: https://www.stackstate.com/wp-content/uploads/2019/02/152x152-favicon.png
maintainers:
  - name: SUSE
    email: suse-observability-ops@suse.com
name: suse-observability
dependencies:
  - name: anomaly-detection
    repository: file://../../local/anomaly-detection/
    version: "*"
    condition: anomaly-detection.enabled
  - name: common
    repository: file://../../local/common/
    version: "*"
  - name: suse-observability-sizing
    repository: file://../../local/suse-observability-sizing/
    version: "*"
  - name: elasticsearch
    repository: file://../../local/elasticsearch/
    version: "*"
  - name: hbase
    repository: file://../../local/hbase/
    version: "*"
  - name: kafka
    repository: file://../../local/kafka/
    version: "*"
  - name: kafkaup-operator
    condition: kafkaup-operator.enabled
    repository: file://../../local/kafkaup-operator/
    version: "*"
  - name: pull-secret
    version: "*"
    repository: file://../../local/pull-secret/
    condition: pull-secret.enabled
  - name: zookeeper
    version: "*"
    repository: file://../../local/zookeeper/
  - name: victoria-metrics-single
    alias: victoria-metrics-0
    version: "*"
    repository: file://../../local/victoria-metrics-single/
    condition: victoria-metrics-0.enabled
  - name: victoria-metrics-single
    alias: victoria-metrics-1
    version: "*"
    repository: file://../../local/victoria-metrics-single/
    condition: victoria-metrics-1.enabled
  - name: clickhouse
    version: "*"
    repository: file://../../local/clickhouse/
  - name: opentelemetry-collector
    version: "*"
    repository: file://../../local/opentelemetry-collector/
  - name: kubernetes-rbac-agent
    repository: file://../../local/kubernetes-rbac-agent/
    version: "*"
    condition: stackstate.k8sAuthorization.enabled
