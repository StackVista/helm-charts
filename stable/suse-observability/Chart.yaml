apiVersion: v2
appVersion: "7.0.0-snapshot.20260415181022-master-2b9c6fe"
version: 2.9.1-pre.84
description: Helm chart for SUSE Observability
keywords:
  - kubernetes
  - observability
  - suse
home: https://gitlab.com/stackvista/stackstate.git
icon: https://www.stackstate.com/wp-content/uploads/2019/02/152x152-favicon.png
maintainers:
  - name: SUSE
    email: suse-observability-ops@suse.com
name: suse-observability
dependencies:
  - name: anomaly-detection
    repository: file://../anomaly-detection/
    version: "5.2.0-snapshot.182"
    condition: anomaly-detection.enabled
  - name: common
    repository: file://../common/
    version: "*"
  - name: suse-observability-sizing
    repository: file://../suse-observability-sizing/
    version: 0.1.15
  - name: elasticsearch
    condition: elasticsearch.enabled
    repository: file://../elasticsearch/
    # For some reason * does not work
    version: "8.19.4-stackstate.20"
  - name: hbase
    condition: hbase.enabled
    repository: file://../hbase/
    version: "0.2.134"
  - name: kafka
    condition: kafka.enabled
    repository: file://../kafka/
    version: 19.1.3-suse-observability.24
  - name: kafkaup-operator
    condition: kafkaup-operator.enabled
    repository: file://../kafkaup-operator/
    version: "0.1.28"
  - name: pull-secret
    version: "*"
    repository: file://../pull-secret/
    condition: pull-secret.enabled
  - name: zookeeper
    version: 8.1.2-suse-observability.22
    repository: file://../zookeeper/
    condition: zookeeper.enabled
  - name: victoria-metrics-single
    alias: victoria-metrics-0
    version: "0.8.53-stackstate.49"
    repository: file://../victoria-metrics-single/
    condition: victoria-metrics-0.enabled
  - name: victoria-metrics-single
    alias: victoria-metrics-1
    version: "0.8.53-stackstate.49"
    repository: file://../victoria-metrics-single/
    condition: victoria-metrics-1.enabled
  - name: clickhouse
    version: 3.6.9-suse-observability.25
    repository: file://../clickhouse/
    condition: clickhouse.enabled
  - name: opentelemetry-collector
    version: 0.108.0-stackstate.27
    repository: file://../opentelemetry-collector
    condition: opentelemetry.enabled
  - name: kubernetes-rbac-agent
    repository: file://../kubernetes-rbac-agent/
    version: "0.0.27"
    condition: stackstate.k8sAuthorization.enabled
