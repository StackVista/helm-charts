    # If set, will be used as fallback for the S3Proxy service account name.
    name: ""
    # minio.serviceAccount.annotations -- DEPRECATED: Use s3proxy.serviceAccount.annotations instead.
    # If set, will be merged into the S3Proxy service account annotations (s3proxy values take precedence).
    annotations: {}
# S3Proxy deployment configuration
s3proxy:
  image:
    # s3proxy.image.registry -- imageRegistry used for the S3Proxy Docker image
    registry: quay.io
    # s3proxy.image.repository -- Image repository for S3Proxy
    repository: stackstate/s3proxy
    # s3proxy.image.tag -- Image tag for S3Proxy
    tag: 3.1.0-c7312e71-release-24
    # s3proxy.image.pullPolicy -- Image pull policy for S3Proxy
    pullPolicy: IfNotPresent
  # s3proxy.resources -- Resource limits and requests for S3Proxy container
  logLevel: "info"
  resources:
    limits:
      cpu: 1000m
      memory: 700Mi
      ephemeral-storage: 1Gi
    requests:
      cpu: 200m
      memory: 700Mi
      ephemeral-storage: 1Mi
  sizing:
    # s3proxy.sizing.baseMemoryConsumption -- Memory reserved for OS and non-heap JVM usage (metaspace, threads, etc)
    baseMemoryConsumption: "250Mi"
    # s3proxy.sizing.javaHeapMemoryFraction -- Percentage of remaining memory (after baseMemoryConsumption) allocated to Java heap
    javaHeapMemoryFraction: "70"
  extraEnv:
    # s3proxy.extraEnv.open -- Extra open environment variables to inject into the S3Proxy pod.
    open: {}
    # s3proxy.extraEnv.secret -- Extra secret environment variables to inject into the S3Proxy pod via a `Secret` object.
    secret: {}
  # s3proxy.nodeSelector -- Node selector for S3Proxy pod (merged with stackstate.components.all.nodeSelector)
  nodeSelector: {}
  # s3proxy.tolerations -- Tolerations for S3Proxy pod (appended to stackstate.components.all.tolerations)
  tolerations: []
  # s3proxy.affinity -- Affinity settings for S3Proxy pod (merged with stackstate.components.all.affinity)
  affinity: {}
  # s3proxy.podAnnotations -- Annotations for S3Proxy pod
  podAnnotations: {}
  serviceAccount:
    # s3proxy.serviceAccount.create -- Whether to create the service account for S3Proxy.
    create: true
    # s3proxy.serviceAccount.name -- Override the service account name. Defaults to "suse-observability-minio" for backward compatibility with the old Minio subchart (e.g. IAM role bindings).
    name: ""
    # s3proxy.serviceAccount.annotations -- Annotations for the S3Proxy service account (e.g. for IAM roles).
    annotations: {}
  securityContext:
    # s3proxy.securityContext.enabled -- Whether or not to enable the securityContext
    enabled: true
    # s3proxy.securityContext.runAsNonRoot -- Ensure that the user is not root (!= 0)
    runAsNonRoot: true
    # s3proxy.securityContext.runAsUser -- The UID (user ID) of the owning user of the process
    runAsUser: 65534
    # s3proxy.securityContext.runAsGroup -- The GID (group ID) of the owning user of the process
    runAsGroup: 65534
    # s3proxy.securityContext.fsGroup -- The GID (group ID) used to mount volumes
    fsGroup: 65534
  metrics:
    # s3proxy.metrics.enabled -- Enable / disable S3Proxy Prometheus metrics.
    enabled: true
    defaultAgentMetricsFilter: '["*"]'
    # s3proxy.metrics.agentAnnotationsEnabled -- Put annotations on each pod to instruct the stackstate agent to scrape the metrics
    agentAnnotationsEnabled: true
    servicemonitor:
      # s3proxy.metrics.servicemonitor.additionalLabels -- Additional labels for targeting Prometheus operator instances.
      additionalLabels: {}
      # s3proxy.metrics.servicemonitor.enabled -- Enable `ServiceMonitor` object; `all.metrics.enabled` *must* be enabled.
      enabled: false
zookeeper:
  image:
    # zookeeper.image.registry -- ZooKeeper image registry
    registry: quay.io
    # zookeeper.image.repository -- ZooKeeper image repository
    repository: stackstate/zookeeper
    # zookeeper.image.tag -- ZooKeeper image tag
    tag: 3.9.5-3.2-release
  resources: {}
  # zookeeper.replicaCount -- Default amount of Zookeeper replicas to provision. Will be overridden by sizing profile if using global.suseObservability.sizing.profile.
  replicaCount: null
  persistence:
    # zookeeper.persistence.size -- Size of the PVC for Zookeeper data. Default is 8Gi, will be overridden by sizing profile if using global.suseObservability.sizing.profile.
    size: null
anomaly-detection:
  # anomaly-detection.enabled -- Enables anomaly detection chart
  enabled: false
  image:
    # anomaly-detection.image.tag -- the chart image tag, e.g. 4.1.3-latest
    tag: 5.2.0-snapshot.192
    # anomaly-detection.image.registry -- Base container image registry for all containers, except for the wait container
    registry: quay.io
    # anomaly-detection.image.spotlightRepository -- Repository of the spotlight Docker image.
    spotlightRepository: stackstate/spotlight
  stackstate:
    # anomaly-detection.stackstate.instance -- **Required Stackstate instance URL.
    instance: '{{ include "stackstate.router.endpoint" . }}'
cluster-role:
  # cluster-role.enabled -- Deploy the ClusterRole(s) and ClusterRoleBinding(s) together with the chart. Can be disabled if these need to be installed by an administrator of the Kubernetes cluster.
  enabled: true
pull-secret:
  # pull-secret.enabled -- Deploy the ImagePullSecret for the chart.
  enabled: false
  # pull-secret.fullNameOverride -- Name of the ImagePullSecret that will be created. This can be referenced by setting the `global.imagePullSecrets[0].name` value in the chart.
  fullNameOverride: ""
  # pull-secret.credentials -- Registry and associated credentials (username, password) that will be stored in the pull-secret
  credentials: []
victoria-metrics-0:
  enabled: true
  server:
    # victoria-metrics-0.server.image.tag -- Victoria Metrics server image tag. Updated by updatecli.
    image:
      tag: v1.136.0-621be04a-release-157
