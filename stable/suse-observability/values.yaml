    # victoria-metrics-0.backup.setupCron.image.tag -- Container-tools image for cron setup. Updated by updatecli.
    setupCron:
      image:
        tag: 1.8.6-4ac12b1a-main-16
    # victoria-metrics-0.backup.vmbackup.image.tag -- VM backup image tag. Updated by updatecli.
    vmbackup:
      image:
        tag: v1.136.0-47ff639a-release-71
