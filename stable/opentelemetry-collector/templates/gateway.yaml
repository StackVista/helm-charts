{{- if .Values.gateway.enabled -}}
{{- $gateways := prepend .Values.gateway.additionalGateways .Values.gateway -}}
{{- range $gateways }}
{{- $kind := .kind | default "HTTPRoute" -}}
{{- if eq $kind "GRPCRoute" }}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
{{- else }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
{{- end }}
metadata:
  {{- if .name }}
  name: {{ printf "%s-%s" (include "opentelemetry-collector.fullname" $) .name }}
  {{- else }}
  name: {{ include "opentelemetry-collector.fullname" $ }}
  {{- end }}
  namespace: {{ template "opentelemetry-collector.namespace" $ }}
  labels:
    {{- include "opentelemetry-collector.labels" $ | nindent 4 }}
    {{- include "opentelemetry-collector.component" $ | nindent 4 }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
      {{- if .port }}
      port: {{ .port }}
      {{- end }}
    {{- end }}
  {{- if .hostnames }}
  hostnames:
    {{- range .hostnames }}
    - {{ tpl . $ | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if eq $kind "GRPCRoute" }}
    - backendRefs:
        - name: {{ include "opentelemetry-collector.fullname" $ }}
          port: {{ .port | default 4317 }}
          {{- if .backendWeight }}
          weight: {{ .backendWeight }}
          {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
    {{- else }}
    - matches:
        - path:
            type: {{ .pathType | default "PathPrefix" }}
            value: {{ .path | default "/" | quote }}
      backendRefs:
        - name: {{ include "opentelemetry-collector.fullname" $ }}
          port: {{ .port | default 4318 }}
          {{- if .backendWeight }}
          weight: {{ .backendWeight }}
          {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      {{- if .timeouts }}
      timeouts:
        {{- toYaml .timeouts | nindent 8 }}
      {{- end }}
    {{- end }}
---
{{- end }}
{{- end }}
