{{- define "hbase.hdfs.journalnode.service" -}}
metadata:
  name: {{ template "common.fullname" . }}-hdfs-jn
  labels:
    app.kubernetes.io/component: hdfs-jn
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 8485
    name: jn
{{- if .Values.all.metrics.enabled }}
  - port: 9404
    name: metrics
{{- end }}
  selector:
    app.kubernetes.io/component: hdfs-jn
{{- end -}}

{{- if .Values.hdfs.namenode.highAvailability.enabled -}}
{{- $commonService := fromYaml (include "common.service" .) -}}
{{- $stackstateHbaseHdfsJournalnodeService := fromYaml (include "hbase.hdfs.journalnode.service" .) -}}
{{- toYaml (merge $stackstateHbaseHdfsJournalnodeService $commonService) -}}
{{- end -}}
