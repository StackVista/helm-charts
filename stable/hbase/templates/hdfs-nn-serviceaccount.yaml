{{- define "hbase.hdfs.namenode.serviceaccount" -}}
metadata:
  name: {{ template "common.fullname" . }}-hdfs-nn
{{- end -}}

{{- if .Values.hdfs.namenode.highAvailability.enabled -}}
{{- $commonServiceAccount := fromYaml (include "common.serviceaccount" .) -}}
{{- $stackstateHbaseHdfsNamenodeServiceAccount := fromYaml (include "hbase.hdfs.namenode.serviceaccount" .) -}}
{{- toYaml (merge $stackstateHbaseHdfsNamenodeServiceAccount $commonServiceAccount) -}}
{{- end -}}
