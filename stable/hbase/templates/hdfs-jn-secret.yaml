{{- define "hbase.hdfs.journalnode.secret" -}}
metadata:
  name: {{ template "common.fullname" . }}-hdfs-jn
data:
{{- range $key, $value := .Values.hdfs.journalnode.extraEnv.secret }}
  {{ $key }}: {{ $value | b64enc | quote }}
{{- end }}
{{- end -}}

{{- if and (.Values.hdfs.journalnode.extraEnv.secret) (.Values.hdfs.namenode.highAvailability.enabled) -}}
{{- $commonSecret := fromYaml (include "common.secret" .) -}}
{{- $stackstateHbaseHdfsJournalnodeSecret := fromYaml (include "hbase.hdfs.journalnode.secret" .) -}}
{{- toYaml (merge $stackstateHbaseHdfsJournalnodeSecret $commonSecret) -}}
{{- end -}}
