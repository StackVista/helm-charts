{{- define "hbase.hdfs.journalnode.container.init" -}}
name: journalnode-init
command:
- sh
- -c
- |
  /entrypoint -c {{ template "common.fullname" . }}-hdfs-nn:9000 -t 300
  chown -R {{ .Values.securityContext.runAsUser }}:{{ .Values.securityContext.runAsGroup }} /hadoop-data
image: "docker.io/dokkupaas/wait:latest"
imagePullPolicy: Always
securityContext:
  allowPrivilegeEscalation: true
  privileged: true
volumeMounts:
- name: {{ template "common.fullname" . }}-hdfs-jn
  mountPath: /hadoop-data
{{- end -}}

{{- define "hbase.hdfs.journalnode.container.main" -}}
name: journalnode
image: "{{ .Values.hdfs.image.repository }}:{{ .Values.hdfs.image.tag }}"
imagePullPolicy: {{ .Values.hdfs.image.pullPolicy }}
args:
- /entrypoint.sh
- /run.sh
- journalnode
env:
{{- include "all.commonEnv" . }}
{{- include "hdfs.journalnode.commonEnv" . }}
{{- include "hbase.hdfs.commonEnv" . }}
ports:
- containerPort: 8485
  name: jn
{{- if .Values.all.metrics.enabled }}
- containerPort: 9404
  name: metrics
{{- end }}
livenessProbe:
  tcpSocket:
    port: jn
readinessProbe:
  tcpSocket:
    port: jn
{{- with .Values.hdfs.journalnode.resources }}
resources:
  {{- toYaml . | nindent 2 }}
{{- end }}
securityContext:
  runAsNonRoot: true
  runAsGroup: {{ .Values.securityContext.runAsGroup }}
  runAsUser: {{ .Values.securityContext.runAsUser }}
volumeMounts:
- name: {{ template "common.fullname" . }}-hdfs-jn
  mountPath: /hadoop-data
{{- end -}}

{{- define "hbase.hdfs.journalnode.statefulset" -}}
{{- $commonContainer := fromYaml (include "common.container" .) -}}
{{- $overrideContainer := fromYaml (include "hbase.hdfs.journalnode.container.main" .) -}}
{{- $stackstateHbaseHdfsJournalnodeContainer := (merge $overrideContainer $commonContainer) }}
{{- $overrideContainer := fromYaml (include "hbase.hdfs.journalnode.container.init" .) -}}
{{- $stackstateHbaseHdfsJournalnodeInitContainer := (merge $overrideContainer $commonContainer) }}
metadata:
  labels:
    app.kubernetes.io/component: hdfs-jn
  name: {{ template "common.fullname" . }}-hdfs-jn
spec:
  podManagementPolicy: Parallel
  replicas: {{ .Values.hdfs.journalnode.replicaCount }}
  serviceName: {{ template "common.fullname" . }}-hdfs-jn
  selector:
    matchLabels:
      app.kubernetes.io/component: hdfs-jn
  template:
    metadata:
      labels:
        app.kubernetes.io/component: hdfs-jn
    spec:
      initContainers:
      - {{ toYaml $stackstateHbaseHdfsJournalnodeInitContainer | nindent 8 }}
      containers:
      - {{ toYaml $stackstateHbaseHdfsJournalnodeContainer | nindent 8 }}
    {{- if or .Values.all.nodeSelector .Values.hdfs.journalnode.nodeSelector }}
      nodeSelector:
      {{- with .Values.all.nodeSelector }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hdfs.journalnode.nodeSelector }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- if or .Values.all.affinity .Values.hdfs.journalnode.affinity }}
      affinity:
      {{- with .Values.all.affinity }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hdfs.journalnode.affinity }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- if or .Values.all.tolerations .Values.hdfs.journalnode.tolerations }}
      tolerations:
      {{- with .Values.all.tolerations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hdfs.journalnode.tolerations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
      volumes:
    {{- if not .Values.hdfs.journalnode.persistence.enabled }}
      - name: {{ template "common.fullname" . }}-hdfs-jn
        emptyDir: {}
    {{- end }}
{{- if .Values.hdfs.journalnode.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: {{ template "common.fullname" . }}-hdfs-jn
    spec:
      accessModes: {{ .Values.hdfs.journalnode.persistence.accessModes }}
      resources:
        requests:
          storage: {{ .Values.hdfs.journalnode.persistence.size }}
      storageClassName: {{ .Values.hdfs.journalnode.persistence.storageClass }}
{{- end }}
{{- end -}}

{{- if .Values.hdfs.namenode.highAvailability.enabled -}}
{{- $commonStatefulSet := fromYaml (include "common.statefulset" .) -}}
{{- $stackstateHbaseHdfsJournalnodeStatefulSet := fromYaml (include "hbase.hdfs.journalnode.statefulset" .) -}}
{{- toYaml (merge $stackstateHbaseHdfsJournalnodeStatefulSet $commonStatefulSet) -}}
{{- end -}}
