name: Update Helm Chart Docker Images
pipelineid: docker-images

scms:
  default:
    kind: gitlab
    spec:
      owner: "{{ .scm.owner }}"
      repository: "{{ .scm.repository }}"
      branch: "{{ .scm.branch }}"
{{- if .scm.directory }}
      directory: "{{ .scm.directory }}"
{{- end }}
      user: "{{ env .scm.userEnv }}"
      email: "{{ env .scm.emailEnv }}"
      token: "{{ requiredEnv .scm.tokenEnv }}"
      workingbranchseparator: "-"
      type: ""
      gpg:
        signingkey: |-
{{ env .scm.gpgKeyEnv | nindent 10 }}
        passphrase: "{{ env .scm.gpgKeyPassEnv }}"

sources:
  clickhouseBackup:
    name: "clickhouse-backup"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/clickhouse-backup"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]+\\.[0-9]+\\.[0-9]+-[a-f0-9]{8}-main-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  clickhouse:
    name: "clickhouse"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/clickhouse"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]+\\.[0-9]+\\.[0-9]+-[a-f0-9]{8}-main-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  containerTools:
    name: "container-tools"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/container-tools"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]+\\.[0-9]+\\.[0-9]+-[a-f0-9]{8}-main-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  elasticsearch:
    name: "elasticsearch"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/elasticsearch"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]+\\.[0-9]+\\.[0-9]+-[a-f0-9]{8}-main-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  elasticsearchExporter:
    name: "elasticsearch-exporter"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/elasticsearch-exporter"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  envoy:
    name: "envoy"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/envoy"
      architecture: "linux/amd64"
      tagfilter: ".*-[0-9]+\\.[0-9]+-release$"
      versionfilter:
        kind: regex/semver
        regex: ".*-([0-9]+\\.[0-9]+)-release$"
  hadoop:
    name: "hadoop"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/hadoop"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  jmxExporter:
    name: "jmx-exporter"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/jmx-exporter"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-[0-9]+-release$"
      versionfilter:
        kind: regex/semver
        regex: ".*-([0-9]+)-release$"
  kafka:
    name: "kafka"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/kafka"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]+\\.[0-9]+\\.[0-9]+-[a-f0-9]{8}-main-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  kubernetesRbacAgent:
    name: "kubernetes-rbac-agent"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/kubernetes-rbac-agent"
      architecture: "linux/amd64"
      tagfilter: "^[a-f0-9]{8}-[0-9]+-release$"
      versionfilter:
        kind: regex/semver
        regex: "^[a-f0-9]{8}-([0-9]+)-release$"
  nginxPrometheusExporter:
    name: "nginx-prometheus-exporter"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/nginx-prometheus-exporter"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-[0-9]+-release$"
      versionfilter:
        kind: regex/semver
        regex: ".*-([0-9]+)-release$"
  suseObservabilityMcp:
    name: "suse-observability-mcp"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/suse-observability-mcp"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]{14}-[0-9a-f]{8}$"
      versionfilter:
        kind: regex/time
        regex: "^([0-9]{14})-[0-9a-f]{8}$"
        pattern: "20060102150405"
  suseObservabilityBorg:
    name: "suse-observability-borg"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/suse-observability-borg"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]{14}-[0-9a-f]{8}$"
      versionfilter:
        kind: regex/time
        regex: "^([0-9]{14})-[0-9a-f]{8}$"
        pattern: "20060102150405"
  victoriaMetrics:
    name: "victoria-metrics"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/victoria-metrics"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  vmagent:
    name: "vmagent"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/vmagent"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  vmbackup:
    name: "vmbackup"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/vmbackup"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  vmrestore:
    name: "vmrestore"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/vmrestore"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  wait:
    name: "wait"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/wait"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  workloadObserver:
    name: "workload-observer"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/workload-observer"
      architecture: "linux/amd64"
      tagfilter: "^[a-f0-9]{8}-[0-9]+-release$"
      versionfilter:
        kind: regex/semver
        regex: "^[a-f0-9]{8}-([0-9]+)-release$"
  zookeeper:
    name: "zookeeper"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/zookeeper"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]+\\.[0-9]+\\.[0-9]+-[0-9]+\\.[0-9]+-release$"
      versionfilter:
        kind: semver
  kafkaupOperator:
    name: "kafkaup-operator"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/kafkaup-operator"
      architecture: "linux/amd64"
      tagfilter: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      versionfilter:
        kind: semver
  stsOpentelemetryCollector:
    name: "sts-opentelemetry-collector"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/sts-opentelemetry-collector"
      architecture: "linux/amd64"
      tagfilter: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
      versionfilter:
        kind: semver
  genericSidecarInjector:
    name: "generic-sidecar-injector"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/generic-sidecar-injector"
      architecture: "linux/amd64"
      tagfilter: "^[a-f0-9]{8}-[0-9]+-release$"
      versionfilter:
        kind: regex/semver
        regex: "^[a-f0-9]{8}-([0-9]+)-release$"
  spotlight:
    name: "spotlight"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/spotlight"
      architecture: "linux/amd64"
      tagfilter: "^\\d+\\.\\d+\\.\\d+-snapshot\\.\\d+$"
      versionfilter:
        kind: semver
        pattern: ">=0.0.0-0"
  promtail:
    name: "promtail"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/promtail"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  s3proxy:
    name: "s3proxy"
    kind: dockerimage
    spec:
      image: "quay.io/stackstate/s3proxy"
      architecture: "linux/amd64"
      tagfilter: ".*-[a-f0-9]{8}-release-[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: ".*-(\\d+)$"
  httpHeaderInjectorChart:
    name: "http-header-injector chart"
    kind: helmchart
    spec:
      url: https://helm.stackstate.io
      name: http-header-injector
      versionfilter:
        kind: semver

# Single pipeline: each target reads from its own sourceid.
# All suse-observability subchart image tags are in stable/suse-observability/values.yaml
# (victoria-metrics-0/1 are aliases for victoria-metrics-single subchart).
targets:
  clickhouseBackup:
    name: "clickhouse-backup"
    kind: yaml
    scmid: "default"
    sourceid: clickhouseBackup
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.clickhouse.backup.image.tag"
  clickhouse:
    name: "clickhouse"
    kind: yaml
    scmid: "default"
    sourceid: clickhouse
    spec:
      file: "stable/suse-observability/values.yaml"
      keys:
        - "$.clickhouse.image.tag"
        - "$.stackstate.components.clickhouseCleanup.image.tag"
  containerToolsSuseObservability:
    name: "container-tools (suse-observability)"
    kind: yaml
    scmid: "default"
    sourceid: containerTools
    spec:
      file: "stable/suse-observability/values.yaml"
      keys:
        - "$.stackstate.components.router.mode.image.tag"
        - "$.stackstate.components.containerTools.image.tag"
  containerToolsVictoriaMetrics:
    name: "container-tools (victoria-metrics backup cron)"
    kind: yaml
    scmid: "default"
    sourceid: containerTools
    spec:
      file: "stable/suse-observability/values.yaml"
      keys:
        - "$.victoria-metrics-0.backup.setupCron.image.tag"
        - "$.victoria-metrics-1.backup.setupCron.image.tag"
  containerToolsSuseObservabilityAgent:
    name: "container-tools (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: containerTools
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.httpHeaderInjectorWebhook.certificatePrehook.image.tag"
  elasticsearch:
    name: "elasticsearch"
    kind: yaml
    scmid: "default"
    sourceid: elasticsearch
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.elasticsearch.imageTag"
  elasticsearchExporter:
    name: "elasticsearch-exporter"
    kind: yaml
    scmid: "default"
    sourceid: elasticsearchExporter
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.elasticsearch.prometheus-elasticsearch-exporter.image.tag"
  envoy:
    name: "envoy"
    kind: yaml
    scmid: "default"
    sourceid: envoy
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.stackstate.components.router.image.tag"
  hadoop:
    name: "hadoop"
    kind: yaml
    scmid: "default"
    sourceid: hadoop
    transformers:
      - findsubmatch:
          pattern: '^\d+\.\d+\.\d+-(.+)$'
          captureindex: 1
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.hbase.hdfs.version"
  jmxExporter:
    name: "jmx-exporter"
    kind: yaml
    scmid: "default"
    sourceid: jmxExporter
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.kafka.metrics.jmx.image.tag"
  kafka:
    name: "kafka"
    kind: yaml
    scmid: "default"
    sourceid: kafka
    spec:
      file: "stable/suse-observability/values.yaml"
      keys:
        - "$.kafka.image.tag"
        - "$.stackstate.components.kafkaTopicCreate.image.tag"
  kubernetesRbacAgent:
    name: "kubernetes-rbac-agent (suse-observability)"
    kind: yaml
    scmid: "default"
    sourceid: kubernetesRbacAgent
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.kubernetes-rbac-agent.containers.rbacAgent.image.tag"
  kubernetesRbacAgentSuseObservabilityAgent:
    name: "kubernetes-rbac-agent (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: kubernetesRbacAgent
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.kubernetes-rbac-agent.containers.rbacAgent.image.tag"
  nginxPrometheusExporter:
    name: "nginx-prometheus-exporter"
    kind: yaml
    scmid: "default"
    sourceid: nginxPrometheusExporter
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.stackstate.components.nginxPrometheusExporter.image.tag"
  suseObservabilityMcp:
    name: "suse-observability-mcp"
    kind: yaml
    scmid: "default"
    sourceid: suseObservabilityMcp
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.stackstate.components.mcp.image.tag"
  suseObservabilityBorg:
    name: "suse-observability-borg"
    kind: yaml
    scmid: "default"
    sourceid: suseObservabilityBorg
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.stackstate.components.aiAssistant.image.tag"
  victoriaMetrics:
    name: "victoria-metrics (victoria-metrics-0/1 server)"
    kind: yaml
    scmid: "default"
    sourceid: victoriaMetrics
    spec:
      file: "stable/suse-observability/values.yaml"
      keys:
        - "$.victoria-metrics-0.server.image.tag"
        - "$.victoria-metrics-1.server.image.tag"
  vmagent:
    name: "vmagent"
    kind: yaml
    scmid: "default"
    sourceid: vmagent
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.stackstate.components.vmagent.image.tag"
  vmbackup:
    name: "vmbackup (victoria-metrics-0/1 backup)"
    kind: yaml
    scmid: "default"
    sourceid: vmbackup
    spec:
      file: "stable/suse-observability/values.yaml"
      keys:
        - "$.victoria-metrics-0.backup.vmbackup.image.tag"
        - "$.victoria-metrics-1.backup.vmbackup.image.tag"
  vmrestore:
    name: "vmrestore"
    kind: yaml
    scmid: "default"
    sourceid: vmrestore
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.victoria-metrics.restore.image.tag"
  wait:
    name: "wait"
    kind: yaml
    scmid: "default"
    sourceid: wait
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.global.wait.image.tag"
  workloadObserver:
    name: "workload-observer"
    kind: yaml
    scmid: "default"
    sourceid: workloadObserver
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.stackstate.components.workloadObserver.image.tag"
  zookeeper:
    name: "zookeeper"
    kind: yaml
    scmid: "default"
    sourceid: zookeeper
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.zookeeper.image.tag"
  kafkaupOperator:
    name: "kafkaup-operator"
    kind: yaml
    scmid: "default"
    sourceid: kafkaupOperator
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.kafkaup-operator.image.tag"
  stsOpentelemetryCollector:
    name: "sts-opentelemetry-collector"
    kind: yaml
    scmid: "default"
    sourceid: stsOpentelemetryCollector
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.opentelemetry-collector.image.tag"
  genericSidecarInjector:
    name: "generic-sidecar-injector"
    kind: yaml
    scmid: "default"
    sourceid: genericSidecarInjector
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.httpHeaderInjectorWebhook.sidecarInjector.image.tag"
  spotlight:
    name: "spotlight"
    kind: yaml
    scmid: "default"
    sourceid: spotlight
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.anomaly-detection.image.tag"
  promtail:
    name: "promtail (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: promtail
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.logsAgent.image.tag"
  httpHeaderInjectorChartVersion:
    name: "http-header-injector chart version (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: httpHeaderInjectorChart
    spec:
      file: "stable/suse-observability-agent/Chart.yaml"
      key: "$.dependencies[0].version"
  s3proxy:
    name: "s3proxy"
    kind: yaml
    scmid: "default"
    sourceid: s3proxy
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.s3proxy.image.tag"
