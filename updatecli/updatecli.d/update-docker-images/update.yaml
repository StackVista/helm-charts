  kubernetesRbacAgentSuseObservabilityAgent:
    name: "kubernetes-rbac-agent (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: kubernetesRbacAgent
    spec:
      file: "stable/suse-observability-agent/values.yaml"
