    sourceid: zookeeper
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.zookeeper.image.tag"
  kafkaupOperator:
    name: "kafkaup-operator"
    kind: yaml
    scmid: "default"
    sourceid: kafkaupOperator
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.kafkaup-operator.image.tag"
  stsOpentelemetryCollector:
    name: "sts-opentelemetry-collector"
    kind: yaml
    scmid: "default"
    sourceid: stsOpentelemetryCollector
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.opentelemetry-collector.image.tag"
  stsOpentelemetryCollectorSuseObservabilityAgent:
    name: "sts-opentelemetry-collector (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: stsOpentelemetryCollector
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.k8sResourceCollector.image.tag"
  genericSidecarInjector:
    name: "generic-sidecar-injector"
    kind: yaml
    scmid: "default"
    sourceid: genericSidecarInjector
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.httpHeaderInjectorWebhook.sidecarInjector.image.tag"
  spotlight:
    name: "spotlight"
    kind: yaml
    scmid: "default"
    sourceid: spotlight
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.anomaly-detection.image.tag"
  promtail:
    name: "promtail (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: promtail
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.logsAgent.image.tag"
  httpHeaderInjectorChartVersion:
    name: "http-header-injector chart version (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: httpHeaderInjectorChart
    spec:
      file: "stable/suse-observability-agent/Chart.yaml"
      key: "$.dependencies[0].version"
  s3proxy:
    name: "s3proxy"
    kind: yaml
    scmid: "default"
    sourceid: s3proxy
    spec:
      file: "stable/suse-observability/values.yaml"
      key: "$.s3proxy.image.tag"
  processAgentTag:
    name: "process-agent (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: processAgentHash
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.nodeAgent.containers.processAgent.image.tag"
  nodeAgentTag:
    name: "node-agent (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: agentHash
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.nodeAgent.containers.agent.image.tag"
  clusterAgentTag:
    name: "cluster-agent (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: agentHash
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.clusterAgent.image.tag"
  checksAgentTag:
    name: "checks-agent (suse-observability-agent)"
    kind: yaml
    scmid: "default"
    sourceid: agentHash
    spec:
      file: "stable/suse-observability-agent/values.yaml"
      key: "$.checksAgent.image.tag"
  suseObservabilityHelmDocs:
    name: "suse-observability README.md (helm-docs)"
    kind: shell
    scmid: "default"
    disablesourceinput: true
    dependson:
      - "target#clickhouseBackup"
      - "target#clickhouse"
      - "target#containerToolsSuseObservability"
      - "target#containerToolsVictoriaMetrics"
      - "target#elasticsearch"
      - "target#elasticsearchExporter"
      - "target#envoy"
      - "target#hadoop"
      - "target#jmxExporter"
      - "target#kafka"
      - "target#kubernetesRbacAgent"
      - "target#nginxPrometheusExporter"
      - "target#suseObservabilityMcp"
      - "target#suseObservabilityBorg"
      - "target#victoriaMetrics"
      - "target#vmagent"
      - "target#vmbackup"
      - "target#vmrestore"
      - "target#wait"
      - "target#workloadObserver"
      - "target#zookeeper"
      - "target#kafkaupOperator"
      - "target#stsOpentelemetryCollector"
      - "target#spotlight"
      - "target#s3proxy"
    spec:
      command: |
        set -e

        VALUES_FILE="stable/suse-observability/values.yaml"
        BASE_REF="origin/{{ requiredEnv .scm.branchEnv }}"

        # If the suse-observability values file did not change vs the base ref
        # updatecli started from, skip the helm-docs regeneration.
        if git diff --quiet "$BASE_REF" -- "$VALUES_FILE"; then
          echo "suse-observability values unchanged vs $BASE_REF; skipping helm-docs"
          exit 0
        fi

        echo "suse-observability values changed vs $BASE_REF; regenerating README.md with helm-docs"
        helm-docs --chart-search-root stable/suse-observability
        echo "Regenerated suse-observability README.md"
      changedif:
        kind: file/checksum
        spec:
          files:
            - stable/suse-observability/README.md
  suseObservabilityAgentChartVersion:
    name: "suse-observability-agent Chart.yaml version"
    kind: shell
    scmid: "default"
    disablesourceinput: true
    dependson:
      - "target#httpHeaderInjectorProxy"
      - "target#httpHeaderInjectorProxyInit"
      - "target#containerToolsSuseObservabilityAgent"
      - "target#kubernetesRbacAgentSuseObservabilityAgent"
      - "target#genericSidecarInjector"
      - "target#promtail"
      - "target#httpHeaderInjectorChartVersion"
      - "target#processAgentTag"
      - "target#nodeAgentTag"
      - "target#clusterAgentTag"
      - "target#checksAgentTag"
    spec:
      command: |
        set -e

        PYTHON_BIN="$(command -v python3.11 || command -v python3 || true)"
        if [ -z "$PYTHON_BIN" ]; then
          echo "python3 is required to bump the suse-observability-agent chart version" >&2
          exit 1
        fi

        # Ensure PyYAML is available for bump_chart_version.py
        "$PYTHON_BIN" -m pip install --quiet pyyaml

        VALUES_FILE="stable/suse-observability-agent/values.yaml"
        CHART_YAML="stable/suse-observability-agent/Chart.yaml"
        BASE_REF="origin/{{ requiredEnv .scm.branchEnv }}"

        # If neither the agent values file nor Chart.yaml changed compared to
        # the base ref updatecli started from, skip the chart bump.
        if git diff --quiet "$BASE_REF" -- "$VALUES_FILE" "$CHART_YAML"; then
          echo "Agent values and Chart.yaml unchanged vs $BASE_REF; skipping chart bump"
          exit 0
        fi

        echo "Agent chart files changed vs $BASE_REF; bumping suse-observability-agent chart version"

        # Helm repos required for bump_chart_version.py to regenerate Chart.lock
        helm repo add stackstate https://helm.stackstate.io >/dev/null 2>&1 || true
        helm repo update >/dev/null 2>&1 || true

        "$PYTHON_BIN" scripts/bump-chart-version/bump_chart_version.py suse-observability-agent
        echo "Bumped suse-observability-agent chart version"
      changedif:
        kind: file/checksum
        spec:
          files:
            - stable/suse-observability-agent/Chart.yaml
            - stable/suse-observability-agent/Chart.lock
