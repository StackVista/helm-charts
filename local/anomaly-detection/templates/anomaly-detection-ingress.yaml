{{- if .Values.ingress.enabled }}
{{- if $.Capabilities.APIVersions.Has "networking.k8s.io/v1/Ingress" }}
apiVersion: networking.k8s.io/v1
{{- else if $.Capabilities.APIVersions.Has "networking.k8s.io/v1beta1/Ingress" }}
apiVersion: networking.k8s.io/v1beta1
{{- else }}
  {{- fail "Unsupported ingress apiVersions: networking.k8s.io/v1beta1/Ingress, networking.k8s.io/v1/Ingress" }}
{{- end }}
kind: Ingress
metadata:
  name: {{ include "common.fullname.short" . }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
{{- if .Values.ingress.tls }}
  tls:
  {{- range .Values.ingress.tls }}
    - hosts:
      {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ include "common.fullname.short" $ }}-ingress-tls
  {{- end }}
{{- end }}
  rules:
  {{- $global := . -}}
  {{- range $host := .Values.ingress.hosts }}
  - host: {{ $host.host }}
    http:
      paths:
      {{- if $.Capabilities.APIVersions.Has "networking.k8s.io/v1/Ingress" }}
      - path: /?(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "common.fullname.short" $global }}
            port:
              number: {{ $global.Values.ingress.port }}
      {{- else if $.Capabilities.APIVersions.Has "networking.k8s.io/v1beta1/Ingress" }}
      - backend:
          serviceName: {{ include "common.fullname.short" $global }}
          servicePort: {{ $global.Values.ingress.port }}
        path: /?(.*)
      {{- end }}
  {{- end }}
{{- end }}
