apiVersion: v1
kind: Service
metadata:
  name: {{ template "anomaly-detection.manager.name" . }}
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/instance: {{ .Release.Namespace }}
    app.kubernetes.io/name: spotlight
    name: {{ template "common.fullname.short" . }}
spec:
  ports:
    - port: {{ .Values.ingress.port }}
      targetPort: 8090
      name: status
    - port: 9404
      targetPort: 9404
      name: metrics
  selector:
    name: {{ template "anomaly-detection.manager.name" . }}
---
{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: "monitoring.coreos.com/v1"
kind: ServiceMonitor
metadata:
  name: {{ template "anomaly-detection.manager.name" . }}
  namespace: {{ default .Release.Namespace }}
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/instance: {{ .Release.Namespace }}
    app.kubernetes.io/name: spotlight
    release: prometheus-operator
spec:
  endpoints:
    - interval: "20s"
      path: /metrics
      port: metrics
      scheme: http
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/component: manager
      app.kubernetes.io/instance: {{ .Release.Namespace }}
      app.kubernetes.io/name: spotlight
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "anomaly-detection.manager.name" . }}
  labels:
    name: {{ template "common.fullname.short" . }}
    {{- with .Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      name: {{ template "anomaly-detection.manager.name" . }}
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        ad.stackstate.com/spotlight.check_names: '["openmetrics"]'
        ad.stackstate.com/spotlight.init_configs: "[{}]"
        ad.stackstate.com/spotlight.instances: '[ { "prometheus_url": "http://%%host%%:9404/metrics", "namespace": "stackstate", "metrics": ["*"] } ]'
        {{ include "anomaly-detection.secret.checksum" . | nindent 8 }}
      labels:
        app.kubernetes.io/component: manager
        app.kubernetes.io/instance: {{ .Release.Namespace }}
        app.kubernetes.io/name: spotlight
        app.kubernetes.io/part-of: stackstate
        name: {{ template "anomaly-detection.manager.name" . }}
        {{- with .Values.global.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "anomaly-detection.image.pullSecret.name" (dict "images" (list .Values.image) "context" $) | nindent 6 }}
      {{- if .Values.manager.nodeSelector }}
      nodeSelector:
        {{- with .Values.manager.nodeSelector }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.manager.tolerations }}
      tolerations:
        {{- with .Values.manager.tolerations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- $sizingAffinity := include "common.sizing.anomaly-detection.affinityConfig" . | fromYaml -}}
      {{- $finalAffinity := .Values.manager.affinity | default dict -}}
      {{- if and (not .Values.manager.affinity) $sizingAffinity -}}
        {{- $finalAffinity = $sizingAffinity -}}
      {{- end -}}
      {{- if $finalAffinity }}
      affinity: {{ $finalAffinity | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.securityContext.enabled }}
      securityContext: {{- omit .Values.securityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
      - name: spotlight
        image: "{{ include "anomaly-detection.image.registry" . }}/{{ .Values.image.spotlightRepository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.imagePullPolicy }}
        livenessProbe:
          httpGet:
            path: /liveness
            port: status
          initialDelaySeconds: 60
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readiness
            port: status
          initialDelaySeconds: 60
          timeoutSeconds: 10
        ports:
        - name: status
          containerPort: 8090
        command: ["spotlight-manager"]
        args:
        - '--conf'
        - './etc/spotlight.yaml'
        - '--instance'
        - '{{ include "anomaly-detection.stackstate.instance" . }}'
        - '--instance-auth'
        {{- if eq .Values.stackstate.authType "token" }}
        - 'k8s-token'
        {{- end }}
        {{- if eq .Values.stackstate.authType "cookie" }}
        - 'cookie'
        - '--instance-username'
        - $(STS_INSTANCE_USERNAME)
        - '--instance-password'
        - $(STS_INSTANCE_PASSWORD)
        {{- end }}
        {{- if eq .Values.stackstate.authType "api-token" }}
        - 'api-token'
        - '--instance-api-token'
        - $(STS_INSTANCE_API_TOKEN)
        {{- end }}
        - '--instance-enable-notification'
        {{- if .Values.global.receiverApiKey }}
        - '--receiver-api-key'
        - $(STS_INSTANCE_RECEIVER_KEY)
        {{- end }}
        - run
        env:
        {{- if eq .Values.stackstate.authType "cookie" }}
        - name: STS_INSTANCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ template "common.fullname.short" . }}-stackstate-auth-secret
              key: stackstate-username
        - name: STS_INSTANCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ template "common.fullname.short" . }}-stackstate-auth-secret
              key: stackstate-password
        {{- end }}
        {{- if eq .Values.stackstate.authType "api-token" }}
        - name: STS_INSTANCE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ template "common.fullname.short" . }}-stackstate-auth-secret
              key: stackstate-api-token
        {{- end }}
        {{- if .Values.global.receiverApiKey }}
        - name: STS_INSTANCE_RECEIVER_KEY
          valueFrom:
            secretKeyRef:
              name: {{ template "common.fullname.short" . }}-stackstate-auth-secret
              key: receiver-api-key
        {{- end }}
        resources:
          limits:
            cpu: {{ .Values.manager.cpu.limit }}
            memory: {{ .Values.manager.memory.limit }}
            ephemeral-storage: {{ .Values.manager.ephemeralStorage.limit }}
          requests:
            cpu: {{ .Values.manager.cpu.request }}
            memory: {{ .Values.manager.memory.request }}
            ephemeral-storage: {{ .Values.manager.ephemeralStorage.request }}
        volumeMounts:
        - name: spotlight-etc-streams
          mountPath: /opt/spotlight/etc
          readOnly: true
        - name: spotlight-artifacts
          mountPath: /var/lib/spotlight/artifacts
      serviceAccountName: {{ template "common.fullname.short" . }}-sa
      volumes:
      - name: spotlight-etc-streams
        projected:
          sources:
            - configMap:
                name: {{ template "common.fullname.short" . }}-spotlight-config-base
                items:
                - key: spotlight.yaml
                  path: spotlight.yaml
      - name: spotlight-artifacts
        persistentVolumeClaim:
          claimName: spotlight-artifacts-volume-claim
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spotlight-artifacts-volume-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.manager.persistentStorage.size }}
  {{ include "anomaly-detection.storage.class" ( dict "persistence" .Values.manager.persistentStorage "global" .Values.global) | nindent 2 }}
