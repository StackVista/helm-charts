# Trigger Beest
#
# Manually fires the beest pipeline-trigger endpoint on GitLab for either the suse-observability or
# suse-observability-agent chart. Beest itself remains on GitLab (out of scope for this migration);
# this workflow only POSTs to its trigger API with the chart's current version.
#
# Trigger: workflow_dispatch only — operator chooses which chart's version to ship to beest.
# Gating: job-level via `inputs.dry_run` (default `true`). Operator must explicitly uncheck
# `dry_run` to actually POST to the beest trigger. Job-level (not step-level) because the
# entire payload is a single curl call — there is no meaningful "passive" mode (you either
# trigger a remote GitLab pipeline or you don't).
#
# GitLab equivalent: collapses two separate jobs (`beest_agent_trigger`,
# `beest_stackstate_trigger`) generated by `.gitlab-ci.jsonnet` into one parametric job whose
# `chart` input selects the right `*_HELM_CHART_VERSION` variable name.
name: Trigger Beest

on:
  workflow_dispatch:
    inputs:
      chart:
        description: Chart whose version to trigger beest with
        type: choice
        required: true
        options:
          - suse-observability
          - suse-observability-agent
      dry_run:
        description: "Skip the beest trigger POST"
        type: boolean
        default: true

jobs:
  # What: POSTs to GitLab's beest pipeline-trigger endpoint with the chosen chart's current
  # Chart.yaml version, mapped to either STACKSTATE_HELM_CHART_VERSION (suse-observability) or
  # AGENT_HELM_CHART_VERSION (suse-observability-agent).
  # Why: kicks off integration testing on beest after a chart change ships.
  # GitLab equivalent: `beest_agent_trigger` and `beest_stackstate_trigger` jobs in
  # `.gitlab-ci.jsonnet`, collapsed here into a single parametric job. The `continue-on-error: true`
  # on the curl step matches GitLab's `allow_failure: true`.
  trigger:
    # Job-level `if:` cannot reference `env.X` (env context unavailable at this scope), so
    # check the boolean input directly.
    if: ${{ !inputs.dry_run }}
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - name: Trigger beest pipeline
        continue-on-error: true   # matches GitLab `allow_failure: true` on beest_*_trigger
        env:
          BEEST_TOKEN:      ${{ secrets.STS_BEEST_TRIGGER_TOKEN }}
          BEEST_PROJECT_ID: ${{ secrets.BEEST_PROJECT_ID }}
        run: |
          chart="${{ inputs.chart }}"
          version=$(yq e ".version" "stable/${chart}/Chart.yaml")
          if [ "$chart" = "suse-observability" ]; then
            var_name="STACKSTATE_HELM_CHART_VERSION"
          else
            var_name="AGENT_HELM_CHART_VERSION"
          fi
          echo "Triggering beest with ${var_name}=${version}"
          curl --verbose --fail-with-body \
            --request POST \
            --form "token=${BEEST_TOKEN}" \
            --form ref=main \
            --form "variables[${var_name}]=${version}" \
            --form "variables[TRIGGER_AGENT_X86_TESTS]=true" \
            "https://gitlab.com/api/v4/projects/${BEEST_PROJECT_ID}/trigger/pipeline"
