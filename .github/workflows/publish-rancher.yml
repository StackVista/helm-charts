# Publish Rancher
#
# Manual workflow that publishes the suse-observability-agent chart + its container images to the
# Rancher OCI/S3 registry. Both jobs call `scripts/ci/publish-suse-agent-to-rancher.sh`, which uses
# `aws s3 cp` to upload the chart repo, invalidates CloudFront, and `skopeo copy`s the images.
#
# Trigger: workflow_dispatch only — operator-initiated; there is no auto-publish path to Rancher.
# Inputs: `dry_run` (boolean, default true). Operator must explicitly uncheck `dry_run` to
# publish for real.
# Gating: step-level via `DRY_RUN` env passed into the script. The script wraps its destructive
# calls (`skopeo copy`, `modify_chart_to_prerelease_version.sh`, `aws s3 cp`,
# `aws cloudfront create-invalidation`) with a `[[ "$DRY_RUN" == "false" ]]` guard so the
# non-destructive setup (helm deps update, sops decrypt, o11y-agent image-list generation,
# helm package, helm repo index) still runs end-to-end — surfacing IRSA / sops / Quay /
# image-list issues during parallel-run rather than at cutover. Helm repo config (mirror of
# GitLab's `before_script: helm_fetch_dependencies`) runs unconditionally too.
#
# GitLab equivalent: replaces the `push_suse-observability-agent_prerelease_to_rancher` and
# `push_suse-observability-agent_to_rancher` jobs generated by `.gitlab-ci.jsonnet`. The prerelease
# job runs first, the release job depends on it (matches GitLab's `needs:`). Both GitLab jobs
# have `before_script: helm_fetch_dependencies`; we mirror that as the explicit
# `Configure helm repos` step.
name: Publish Rancher

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip destructive publish steps (skopeo copy, modify-chart-version, aws s3 cp, cloudfront invalidation)"
        type: boolean
        default: true

env:
  # workflow_dispatch is the only trigger here, so always honor inputs.dry_run.
  # GH-expression gotcha: STRING 'false' is truthy, BOOLEAN false is falsy — hence the
  # `(inputs.dry_run && 'true' || 'false')` coercion.
  DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
  # IRSA propagation into the container: job (see header comment). Account 766509113410 is the
  # tooling account (terraform-infra/global.tfvars). Role is the one bound to the docker runner's
  # service account via IRSA in iam_github_runner_deploy.tf.
  AWS_ROLE_ARN: arn:aws:iam::766509113410:role/StackStateRoleGithubRunnerDeploy
  AWS_WEB_IDENTITY_TOKEN_FILE: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
  AWS_REGION: eu-west-1

jobs:
  # What: runs `publish-suse-agent-to-rancher.sh` with no argument, which publishes the agent chart
  # to Rancher in prerelease mode (adds the prerelease suffix before upload).
  # Why: lets the prerelease land in the Rancher registry for downstream validation before the
  # release version goes out.
  # GitLab equivalent: `push_suse-observability-agent_prerelease_to_rancher` in
  # `.gitlab-ci.jsonnet`.
  push_prerelease_to_rancher:
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
      # Mount the runner pod's IRSA projected-token directory into the job container so the AWS
      # SDK inside sops can read AWS_WEB_IDENTITY_TOKEN_FILE. See header comment.
      volumes:
        - /var/run/secrets/eks.amazonaws.com:/var/run/secrets/eks.amazonaws.com
    steps:
      - uses: actions/checkout@v5
      # GitLab equivalent: `before_script: helm_fetch_dependencies` on push_chart_job.
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - run: ./scripts/ci/publish-suse-agent-to-rancher.sh

  # What: runs the same `publish-suse-agent-to-rancher.sh` with the `release` argument, which
  # publishes the release-version chart + images to the Rancher registry.
  # Why: ships the actual release after the prerelease step has succeeded.
  # GitLab equivalent: `push_suse-observability-agent_to_rancher` in `.gitlab-ci.jsonnet`. The
  # `needs: push_prerelease_to_rancher` matches GitLab's
  # `needs: ['push_suse-observability-agent_prerelease_to_rancher']`.
  push_to_rancher:
    needs: push_prerelease_to_rancher
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
      # Mount the runner pod's IRSA projected-token directory into the job container so the AWS
      # SDK inside sops can read AWS_WEB_IDENTITY_TOKEN_FILE. See header comment.
      volumes:
        - /var/run/secrets/eks.amazonaws.com:/var/run/secrets/eks.amazonaws.com
    steps:
      - uses: actions/checkout@v5
      # GitLab equivalent: `before_script: helm_fetch_dependencies` on push_chart_job.
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - run: ./scripts/ci/publish-suse-agent-to-rancher.sh release
