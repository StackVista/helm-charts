# Publish Rancher: manual prerelease + release push of suse-observability-agent to the Rancher
# OCI/S3 registry. Both jobs call `publish-suse-agent-to-rancher.sh` (skopeo copy of images,
# aws s3 cp of the chart, cloudfront invalidation). DRY_RUN passes through to the script,
# which wraps its destructive calls — non-destructive setup (helm deps, sops, image-list,
# helm package, helm repo index) still runs end-to-end.
name: Publish Rancher

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip destructive publish steps (skopeo copy, modify-chart-version, aws s3 cp, cloudfront invalidation)"
        type: boolean
        default: true

env:
  # GH-expression gotcha: STRING 'false' is truthy, BOOLEAN false is falsy — hence the coercion.
  DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
  # IRSA: tooling account (766509113410), role bound to the docker runner's service account
  # via terraform-infra/iam_github_runner_deploy.tf. The volume mount below brings the runner
  # pod's projected token into the container so AWS SDK / sops can read it.
  AWS_ROLE_ARN: arn:aws:iam::766509113410:role/StackStateRoleGithubRunnerDeploy
  AWS_WEB_IDENTITY_TOKEN_FILE: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
  AWS_REGION: eu-west-1

jobs:
  # Prerelease: script adds `-pre` suffix to Chart.yaml version before upload.
  push_prerelease_to_rancher:
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
      volumes:
        - /var/run/secrets/eks.amazonaws.com:/var/run/secrets/eks.amazonaws.com   # IRSA token
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - run: ./scripts/ci/publish-suse-agent-to-rancher.sh

  # Release: same script with `release` arg — ships the unmodified Chart.yaml version.
  push_to_rancher:
    needs: push_prerelease_to_rancher
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
      volumes:
        - /var/run/secrets/eks.amazonaws.com:/var/run/secrets/eks.amazonaws.com   # IRSA token
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - run: ./scripts/ci/publish-suse-agent-to-rancher.sh release
