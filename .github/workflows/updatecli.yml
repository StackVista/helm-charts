# Updatecli: all updatecli-related CI in one file.
#
# Push (paths: updatecli/**) → validate_config + validate_diff (read-only, surface what an
# updatecli config edit WOULD do before it merges).
#
# workflow_dispatch → apply + follow_up. apply runs `updatecli pipeline apply` for the chosen
# pipeline (docker_images / stackstate / stackpacks). follow_up branches on the apply output:
# direct squash-push to target branch (stackstate, stackpacks) OR open a PR (docker_images).
# apply + follow_up are job-level-gated on `!inputs.dry_run` — operator must explicitly opt in.
name: Updatecli

on:
  push:
    paths:
      - 'updatecli/**'
  workflow_dispatch:
    inputs:
      pipeline:
        description: Updatecli pipeline to run
        type: choice
        required: true
        options: [docker_images, stackstate, stackpacks]
      target_branch:
        description: Branch updatecli should commit/push to
        type: string
        required: true
      stackstate_source_branch:
        description: Source branch for stackstate pipeline
        type: string
        default: master
      stackpacks_source_branch:
        description: Source branch for stackpacks pipeline
        type: string
        default: master
      dry_run:
        description: "Skip `updatecli pipeline apply` + follow_up (squash-push / open PR)"
        type: boolean
        default: true

env:
  # GH-expression gotcha: STRING 'false' is truthy, BOOLEAN false is falsy — hence the coercion.
  # Validate-only jobs ignore DRY_RUN; only the apply + follow_up jobs check the input directly.
  DRY_RUN: >-
    ${{ github.event_name == 'workflow_dispatch'
        && (inputs.dry_run && 'true' || 'false')
        || 'true' }}

jobs:
  # yamllint + existence check for each pipeline's update.yaml. Read-only.
  validate_config:
    if: github.event_name == 'push'
    runs-on: docker
    container:
      image: quay.io/helmpack/chart-testing:v3.14.0
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
    steps:
      - uses: actions/checkout@v5
      - run: |
          test -f updatecli/values.d/values.yaml
          yamllint -d "{rules: {document-start: disable, line-length: disable}}" updatecli/values.d/values.yaml
          for dir in update-docker-images update-stackstate update-stackpacks; do
            test -f "updatecli/updatecli.d/$dir/update.yaml"
          done

  # `updatecli pipeline diff` for each pipeline — shows reviewers the planned changes.
  # Uses the auto-provisioned github.token for HELM_CHARTS_PAT (contents: read is enough for diff).
  validate_diff:
    if: github.event_name == 'push'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    env:
      TARGET_BRANCH: ${{ github.base_ref || 'master' }}
      STACKSTATE_SOURCE_BRANCH: master
      STACKPACKS_SOURCE_BRANCH: master
    steps:
      - uses: actions/checkout@v5
      - env:
          HELM_CHARTS_PAT: ${{ github.token }}
        run: |
          for dir in update-docker-images update-stackstate update-stackpacks; do
            updatecli pipeline diff --config "updatecli/updatecli.d/$dir/" --values updatecli/values.d/values.yaml
          done

  # Runs `updatecli pipeline apply` against the chosen pipeline. Outputs feed follow_up.
  # `working_branch` follows updatecli's `updatecli-<target>-<pipelineid>` naming convention.
  apply:
    # Job-level `if:` can't reference `env.DRY_RUN` (env context unavailable at job scope —
    # https://docs.github.com/en/actions/learn-github-actions/contexts#context-availability),
    # so check the boolean input directly.
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    outputs:
      pipelineid:     ${{ steps.meta.outputs.pipelineid }}
      dir:            ${{ steps.meta.outputs.dir }}
      direct_push:    ${{ steps.meta.outputs.direct_push }}
      commit_msg:     ${{ steps.meta.outputs.commit_msg }}
      pr_title:       ${{ steps.meta.outputs.pr_title }}
      working_branch: ${{ steps.meta.outputs.working_branch }}
    env:
      TARGET_BRANCH:            ${{ inputs.target_branch }}
      STACKSTATE_SOURCE_BRANCH: ${{ inputs.stackstate_source_branch }}
      STACKPACKS_SOURCE_BRANCH: ${{ inputs.stackpacks_source_branch }}
    steps:
      - uses: actions/checkout@v5
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - id: meta
        env:
          PIPELINE: ${{ inputs.pipeline }}
          TARGET: ${{ inputs.target_branch }}
        run: |
          case "$PIPELINE" in
            docker_images)
              pipelineid="docker-images"
              dir="update-docker-images"
              direct_push="false"
              pr_title="Bump helm chart docker images"
              commit_msg=""
              ;;
            stackstate)
              pipelineid="stackstate"
              dir="update-stackstate"
              direct_push="true"
              pr_title=""
              commit_msg="Bump StackState and StackGraph versions"
              ;;
            stackpacks)
              pipelineid="stackpacks"
              dir="update-stackpacks"
              direct_push="true"
              pr_title=""
              commit_msg="Bump StackPacks version"
              ;;
          esac
          {
            echo "pipelineid=$pipelineid"
            echo "dir=$dir"
            echo "direct_push=$direct_push"
            echo "pr_title=$pr_title"
            echo "commit_msg=$commit_msg"
            echo "working_branch=updatecli-${TARGET}-${pipelineid}"
          } >> "$GITHUB_OUTPUT"
      - name: Apply updatecli pipeline
        env:
          GH_APP_SLUG:      ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN:         ${{ steps.app-token.outputs.token }}
          HELM_CHARTS_PAT:  ${{ steps.app-token.outputs.token }}
          UPDATE_CLI_USER:  ${{ steps.app-token.outputs.app-slug }}[bot]
          UPDATE_CLI_EMAIL: ${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: |
          ./scripts/ci/configure_git.sh
          updatecli pipeline apply \
            -c "updatecli/updatecli.d/${{ steps.meta.outputs.dir }}/" \
            -v updatecli/values.d/values.yaml

  # Branches on apply's `direct_push` output: squash-push for stackstate/stackpacks, or open PR
  # via `gh pr create` for docker_images.
  follow_up:
    needs: apply
    # See `apply` job for why we check `!inputs.dry_run` here instead of env.DRY_RUN.
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    env:
      TARGET_BRANCH:    ${{ inputs.target_branch }}
      UPDATECLI_BRANCH: ${{ needs.apply.outputs.working_branch }}
    steps:
      - uses: actions/checkout@v5
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - name: Configure git
        env:
          GH_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN:    ${{ steps.app-token.outputs.token }}
        run: ./scripts/ci/configure_git.sh
      - name: Squash-push (direct) OR open PR
        env:
          GH_TOKEN:   ${{ steps.app-token.outputs.token }}
          COMMIT_MSG: ${{ needs.apply.outputs.commit_msg }}
          PR_TITLE:   ${{ needs.apply.outputs.pr_title }}
        run: |
          if [ "${{ needs.apply.outputs.direct_push }}" = "true" ]; then
            ./scripts/ci/updatecli_squash_push.sh \
              "$UPDATECLI_BRANCH" "$TARGET_BRANCH" "$COMMIT_MSG"
          else
            ./scripts/ci/open_updatecli_pr.sh \
              "$UPDATECLI_BRANCH" "$TARGET_BRANCH" "$PR_TITLE"
          fi
