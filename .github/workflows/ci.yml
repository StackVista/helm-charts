# CI
#
# Per-chart build / validate / test workflow. Fires on every push (any branch, including PR
# branches) and on manual dispatch. The chart matrix is computed once up front by the in-house
# `detect-changes` composite action — every downstream job consumes its outputs and fans out via
# `strategy.matrix.chart`, only running for charts touched by the current diff.
#
# Gating: this workflow is purely read-only (no publishing); it has no `PUBLISH_ENABLED` gate.
# Jobs simply skip themselves when their matrix evaluates to `[]`.
#
# GitLab equivalent: replaces the `build_*`, `validate_*`, `test_*`, and `resource_usage` job
# families generated by `.gitlab-ci.jsonnet`. GitLab's per-job `rules: changes:` distributed
# filtering is replaced by the single `detect_changes` job + matrix fan-out. (The GitLab
# `validate_updatecli_*` jobs moved to `updatecli.yml`, triggered there by a `paths:` filter.)
#
# Runner notes: most jobs run on `runs-on: docker` (small runners) inside Quay images; the heavy
# `test_*` and `resource_usage` jobs use `runs-on: xlarge` which maps to GitLab's
# `tags: [sts-k8s-xl-runner]`.
name: CI

on:
  push: {}
  workflow_dispatch: {}

env:
  HELM_VERSION: v3.1.2
  CGO_ENABLED: "0"
  GOPATH: /go

jobs:
  # What: composite-action wrapper that produces three outputs: the stable-chart matrix, the
  # local-chart matrix, and the `resource_usage_changed` boolean used to gate the resource_usage
  # job.
  # Why: replaces GitLab's per-job `rules: changes:` distributed filtering with a single up-front
  # diff job; downstream jobs simply skip when their matrix is empty.
  # GitLab equivalent: no direct equivalent — GitLab inferred per-job filtering inline. New on
  # the GitHub side. (updatecli changes are detected at the workflow level via a `paths:` filter
  # on `.github/workflows/updatecli.yml` — they don't pass through this action.)
  detect_changes:
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    outputs:
      stable: ${{ steps.d.outputs.stable }}
      local: ${{ steps.d.outputs.local }}
      resource_usage_changed: ${{ steps.d.outputs.resource_usage_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: d
        uses: ./.github/actions/detect-changes

  # What: for each affected stable chart, builds 2nd-degree `file://` deps, runs
  # `helm dependencies build`, packages the chart, and uploads `charts/` + `build/` as the
  # `build-<chart>` artifact.
  # Why: produces the tgz + materialised subcharts that downstream validate / test jobs reuse, and
  # mirrors the build step that publish-internal.yml needs.
  # GitLab equivalent: `build_<chart>` jobs generated by `build_chart_job(chart)` in
  # `.gitlab-ci.jsonnet`.
  build_stable:
    needs: detect_changes
    if: needs.detect_changes.outputs.stable != '[]'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.stable) }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos and fetch deps
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - name: Build 2nd-degree file:// deps
        run: |
          yq e '.dependencies[] | select (.repository == "file*").repository | sub("^file://","")' \
            stable/${{ matrix.chart }}/Chart.yaml \
            | xargs -I % helm dependencies build --skip-refresh stable/${{ matrix.chart }}/%
      - name: Build chart
        run: |
          helm dependencies build stable/${{ matrix.chart }}
          mkdir -p stable/${{ matrix.chart }}/build
          helm package --destination stable/${{ matrix.chart }}/build stable/${{ matrix.chart }}
      - uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.chart }}
          path: |
            stable/${{ matrix.chart }}/charts/
            stable/${{ matrix.chart }}/build/

  # What: for each affected local chart, builds 2nd-degree deps + runs `helm dependencies build`,
  # then uploads the materialised `charts/` directory. No `helm package` — local charts are never
  # published.
  # Why: same purpose as `build_stable`, scoped to charts under `local/` which are consumed
  # only as `file://` deps of stable parents.
  # GitLab equivalent: `build_local_<chart>` jobs generated by `build_local_chart_job(chart)` in
  # `.gitlab-ci.jsonnet`.
  build_local:
    needs: detect_changes
    if: needs.detect_changes.outputs.local != '[]'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.local) }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - name: Build 2nd-degree deps
        run: |
          yq e '.dependencies[] | select (.repository == "file*").repository | sub("^file://","")' \
            local/${{ matrix.chart }}/Chart.yaml \
            | xargs -I % helm dependencies build --skip-refresh local/${{ matrix.chart }}/%
      - name: Build chart
        run: helm dependencies build local/${{ matrix.chart }}
      # Multi-path upload: `charts/` is what consumers actually need, but it can be empty
      # for leaf charts (no `dependencies:` in Chart.yaml). Adding `Chart.yaml` (always
      # exists) ensures the artifact is never empty so `upload-artifact` doesn't warn and
      # `download-artifact` doesn't fail. As a bonus, multi-path uploads preserve the
      # parent directory in the artifact — consumers download into `local/<chart>/` and
      # the layout is identical to the source tree (the same shape build_stable uses).
      - uses: actions/upload-artifact@v6
        with:
          name: build-local-${{ matrix.chart }}
          path: |
            local/${{ matrix.chart }}/charts/
            local/${{ matrix.chart }}/Chart.yaml

  # What: yamale schema check on `Chart.yaml`, yamllint on `Chart.yaml`/`values.yaml`/
  # `ci/default-values.yaml`, `helm lint`, the local-dep-version check, and kubeconform — all run
  # against the artifact produced by `build_stable`.
  # Why: catches lint/schema/version-pin/kubeconform regressions before the chart can be packaged
  # for publish.
  # GitLab equivalent: `validate_<chart>` jobs generated by `validate_chart_job(chart)` in
  # `.gitlab-ci.jsonnet`.
  validate_stable:
    needs: [detect_changes, build_stable]
    if: needs.detect_changes.outputs.stable != '[]'
    runs-on: docker
    container:
      image: quay.io/helmpack/chart-testing:v3.14.0
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.stable) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          name: build-${{ matrix.chart }}
          path: stable/${{ matrix.chart }}/
      - run: ./scripts/ci/validate_before_script.sh
      - run: yamale --schema /etc/ct/chart_schema.yaml stable/${{ matrix.chart }}/Chart.yaml
      - run: yamllint --config-file /etc/ct/lintconf.yaml stable/${{ matrix.chart }}/Chart.yaml
      - run: yamllint --config-file /etc/ct/lintconf.yaml stable/${{ matrix.chart }}/values.yaml
      - run: |
          if [ -f stable/${{ matrix.chart }}/ci/default-values.yaml ]; then
            yamllint --config-file /etc/ct/lintconf.yaml stable/${{ matrix.chart }}/ci/default-values.yaml
            helm lint stable/${{ matrix.chart }} --values stable/${{ matrix.chart }}/ci/default-values.yaml
          fi
      - run: ./scripts/ci/validate_local_dep_versions.sh stable/${{ matrix.chart }}
      - run: ./scripts/ci/validate_kubeconform.sh stable/${{ matrix.chart }}

  # What: runs `validate_chart_images.sh`, which uses `skopeo inspect` to verify every image
  # referenced by the chart resolves anonymously (catches typo'd image tags / missing public mirrors).
  # Hardcoded to `suse-observability` and `suse-observability-agent` — the only charts with a
  # list-images helper — and the inner `if:` skips charts that aren't actually in the diff.
  # Why: prevents shipping a chart whose images can't be pulled by end users.
  # GitLab equivalent: `validate_<chart>_images` jobs generated by
  # `validate_chart_images_job(chart)` in `.gitlab-ci.jsonnet`.
  validate_stable_images:
    needs: [detect_changes, build_stable]
    if: contains(needs.detect_changes.outputs.stable, '"suse-observability"') || contains(needs.detect_changes.outputs.stable, '"suse-observability-agent"')
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        chart: [suse-observability, suse-observability-agent]
    steps:
      - uses: actions/checkout@v5
      # The o11y-get-images.sh helper invokes `helm template`/`helm show`, which
      # fails with "missing in charts/ directory" unless the chart's subcharts
      # are materialised. The build_stable job uploaded them as the
      # `build-<chart>` artifact; pull it down before running the validator.
      # GitLab inherited build artifacts automatically across pipeline stages;
      # GitHub Actions requires explicit `download-artifact`.
      - uses: actions/download-artifact@v7
        if: contains(needs.detect_changes.outputs.stable, format('"{0}"', matrix.chart))
        with:
          name: build-${{ matrix.chart }}
          path: stable/${{ matrix.chart }}/
      - if: contains(needs.detect_changes.outputs.stable, format('"{0}"', matrix.chart))
        run: ./scripts/ci/validate_chart_images.sh stable/${{ matrix.chart }}

  # What: same lint / schema / kubeconform shape as `validate_stable`, but for local charts.
  # Skips the version-bump check because local charts are pinned to `version: "*"` by their
  # consumers and never get bumped on their own.
  # Why: catches the same regressions for local subcharts before they break their stable parents.
  # GitLab equivalent: `validate_local_<chart>` jobs generated by `validate_local_chart_job(chart)`
  # in `.gitlab-ci.jsonnet`.
  validate_local:
    needs: [detect_changes, build_local]
    if: needs.detect_changes.outputs.local != '[]'
    runs-on: docker
    container:
      image: quay.io/helmpack/chart-testing:v3.14.0
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.local) }}
    steps:
      - uses: actions/checkout@v5
      # build_local now uses a multi-path upload (charts/ + Chart.yaml) so the artifact
      # preserves the `local/<chart>/` parent dir. Download into that parent and the
      # tree restores at `local/<chart>/charts/<dep>.tgz` + `local/<chart>/Chart.yaml`,
      # matching where helm template expects them. Same shape as validate_stable.
      - uses: actions/download-artifact@v7
        with:
          name: build-local-${{ matrix.chart }}
          path: local/${{ matrix.chart }}/
      - run: ./scripts/ci/validate_before_script.sh
      - run: yamale --schema /etc/ct/chart_schema.yaml local/${{ matrix.chart }}/Chart.yaml
      - run: yamllint --config-file /etc/ct/lintconf.yaml local/${{ matrix.chart }}/Chart.yaml
      - run: |
          if [ -f local/${{ matrix.chart }}/values.yaml ]; then
            yamllint --config-file /etc/ct/lintconf.yaml local/${{ matrix.chart }}/values.yaml
          fi
          if [ -f local/${{ matrix.chart }}/ci/default-values.yaml ]; then
            yamllint --config-file /etc/ct/lintconf.yaml local/${{ matrix.chart }}/ci/default-values.yaml
            helm lint local/${{ matrix.chart }} --values local/${{ matrix.chart }}/ci/default-values.yaml
          fi
      - run: ./scripts/ci/validate_local_dep_versions.sh local/${{ matrix.chart }}
      - run: ./scripts/ci/validate_kubeconform.sh local/${{ matrix.chart }}

  # What: runs `verify_versions_bumped.sh` against each affected stable chart, ensuring its
  # Chart.yaml version has actually been bumped relative to the target branch. `suse-observability`
  # is skipped via the inner `if:` (its version is bumped automatically by the post-publish script,
  # not by humans).
  # Why: forces contributors to bump chart versions; otherwise chartmuseum would refuse the push.
  # GitLab equivalent: `check_<chart>_version` jobs generated by `check_chart_version_job(chart)`
  # in `.gitlab-ci.jsonnet`, including the same `chart != 'suse-observability'` exclusion (here
  # implemented as a step-level `if:` instead of generator-time filter).
  check_chart_version:
    needs: detect_changes
    if: needs.detect_changes.outputs.stable != '[]'
    runs-on: docker
    container:
      image: quay.io/helmpack/chart-testing:v3.14.0
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.stable) }}
    env:
      TARGET_BRANCH: ${{ github.base_ref || 'master' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - if: matrix.chart != 'suse-observability'
        run: |
          ./scripts/ci/validate_before_script.sh
          ./scripts/ci/verify_versions_bumped.sh ${{ matrix.chart }}

  # What: runs `go test ./stable/<chart>/test/...` for each affected stable chart on the `xlarge`
  # runner, with the Go module cache restored from the actions/cache key. Skips with a notice if
  # no test files exist.
  # Why: executes the Terratest-based helm template tests that are the bulk of the chart test
  # coverage.
  # GitLab equivalent: `test_<chart>` jobs generated by `test_chart_job(chart)` in
  # `.gitlab-ci.jsonnet`. `runs-on: xlarge` maps to GitLab's `tags: [sts-k8s-xl-runner]`.
  test_stable:
    needs: [detect_changes, build_stable]
    if: needs.detect_changes.outputs.stable != '[]'
    runs-on: xlarge
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.stable) }}
    steps:
      - uses: actions/checkout@v5
      # Terratest's helm.RenderTemplate shells out to `helm template`, which fails with
      # "missing in charts/ directory" unless the chart's subcharts are materialised.
      # build_stable already produced them as the `build-<chart>` artifact (two-path upload
      # preserves the parent dir, so we download into `stable/<chart>/` and the contents
      # land at `stable/<chart>/charts/` + `stable/<chart>/build/`).
      # GitLab inherited build artifacts across stages automatically; GH Actions requires
      # explicit download.
      - uses: actions/download-artifact@v7
        with:
          name: build-${{ matrix.chart }}
          path: stable/${{ matrix.chart }}/
      # actions/cache@v5 invokes `tar --posix ...` to archive the cache during the
      # post-job save step. BusyBox's tar (the default in Alpine sts-ci-images) doesn't
      # support `--posix`, so cache save fails with "unrecognized option: posix".
      # Install GNU tar before the cache action so its post-job hook can run successfully.
      - run: apk add --no-cache tar
      - uses: actions/cache@v5
        with:
          path: /go/pkg/mod/
          key: gomod-${{ hashFiles('go.mod', 'go.sum') }}
      # Image is Alpine; default `sh` (busybox) has no bash builtins like `compgen`.
      # `ls <glob> >/dev/null 2>&1` is the POSIX-portable "does this glob match anything?"
      # check — exits 0 when at least one file matches, non-zero otherwise.
      - run: |
          if ls stable/${{ matrix.chart }}/test/*.go >/dev/null 2>&1; then
            go mod download
            # `-v` prints `=== RUN`/`--- PASS` per test so the GH Actions log streams live
            # test progress instead of pausing on a single multi-minute `go test` line.
            go test -v ./stable/${{ matrix.chart }}/test/...
          else
            echo "::notice::no tests for ${{ matrix.chart }}, skipping"
          fi

  # What: same shape as `test_stable` but scoped to `./local/<chart>/test/...` on the `xlarge`
  # runner.
  # Why: covers Terratest tests that local subcharts define for themselves (independent of their
  # stable parents' tests).
  # GitLab equivalent: `test_local_<chart>` jobs generated by `test_local_chart_job(chart)` in
  # `.gitlab-ci.jsonnet`.
  test_local:
    needs: [detect_changes, build_local]
    if: needs.detect_changes.outputs.local != '[]'
    runs-on: xlarge
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.local) }}
    steps:
      - uses: actions/checkout@v5
      # build_local uses a multi-path upload preserving `local/<chart>/`. Download
      # into that parent so the layout matches the source tree. Same shape as test_stable.
      - uses: actions/download-artifact@v7
        with:
          name: build-local-${{ matrix.chart }}
          path: local/${{ matrix.chart }}/
      # actions/cache@v5 invokes `tar --posix ...` to archive the cache during the
      # post-job save step. BusyBox's tar (the default in Alpine sts-ci-images) doesn't
      # support `--posix`, so cache save fails with "unrecognized option: posix".
      # Install GNU tar before the cache action so its post-job hook can run successfully.
      - run: apk add --no-cache tar
      - uses: actions/cache@v5
        with:
          path: /go/pkg/mod/
          key: gomod-${{ hashFiles('go.mod', 'go.sum') }}
      # Same POSIX glob-existence check as test_stable — busybox `sh` has no `compgen`.
      - run: |
          if ls local/${{ matrix.chart }}/test/*.go >/dev/null 2>&1; then
            go mod download
            # `-v` streams live test progress (see test_stable for rationale).
            go test -v ./local/${{ matrix.chart }}/test/...
          else
            echo "::notice::no tests for ${{ matrix.chart }}, skipping"
          fi

  # What: builds suse-observability + suse-observability-values deps, runs `go test ./test/...`
  # (the repo-root resource-usage test suite), then uploads `test/resource_usage.txt` as an
  # artifact. Gated by the `resource_usage_changed` flag from `detect_changes` so it only runs when the
  # relevant inputs change.
  # Why: tracks the chart's projected pod/CPU/memory footprint over time; the artifact is the
  # historical record.
  # GitLab equivalent: `resource_usage` job in `.gitlab-ci.jsonnet`. `runs-on: xlarge` matches the
  # GitLab `sts-k8s-xl-runner` tag.
  resource_usage:
    needs: detect_changes
    if: needs.detect_changes.outputs.resource_usage_changed == 'true'
    runs-on: xlarge
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      # actions/cache@v5 invokes `tar --posix ...` to archive the cache during the
      # post-job save step. BusyBox's tar (the default in Alpine sts-ci-images) doesn't
      # support `--posix`, so cache save fails with "unrecognized option: posix".
      # Install GNU tar before the cache action so its post-job hook can run successfully.
      - run: apk add --no-cache tar
      - uses: actions/cache@v5
        with:
          path: /go/pkg/mod/
          key: gomod-${{ hashFiles('go.mod', 'go.sum') }}
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - run: |
          yq e '.dependencies[] | select (.repository == "file*").repository | sub("^file://","")' \
            stable/suse-observability/Chart.yaml \
            | xargs -I % helm dependencies build --skip-refresh stable/suse-observability/%
          helm dependencies build stable/suse-observability
          helm dependencies build stable/suse-observability-values
          go mod download
          # `-v` streams live test progress (see test_stable for rationale).
          go test -v ./test/...
      - uses: actions/upload-artifact@v6
        with:
          name: resource-usage
          path: test/resource_usage.txt
