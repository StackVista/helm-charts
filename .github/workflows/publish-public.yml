# Publish Public: manual prerelease + release push to the PUBLIC chartmuseum (`CHARTMUSEUM_URL`,
# distinct from the internal chartmuseum used by ci.yml's push_to_internal).
#
# `suse-observability` is intentionally absent from the choice list — it ships only via the
# internal chartmuseum. Only public-facing helper charts go here.
#
# Operator must explicitly uncheck `dry_run` to publish for real.
name: Publish Public

on:
  workflow_dispatch:
    inputs:
      chart:
        description: Chart to publish
        type: choice
        required: true
        options:
          - suse-observability-agent
          - suse-observability-values
      dry_run:
        description: "Skip destructive publish steps (modify-chart-version, cm-push)"
        type: boolean
        default: true

env:
  # GH-expression gotcha: STRING 'false' is truthy, BOOLEAN false is falsy — hence the
  # `(inputs.dry_run && 'true' || 'false')` coercion.
  DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}

jobs:
  # Prerelease: rewrites Chart.yaml version to `-pre.N`, then cm-pushes.
  push_prerelease_to_public:
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    env:
      CHART: stable/${{ inputs.chart }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - name: helm deps update
        run: helm dependencies update --skip-refresh "$CHART"
      - name: Rewrite Chart.yaml to prerelease version
        if: env.DRY_RUN == 'false'
        run: ./scripts/ci/modify_chart_to_prerelease_version.sh "$CHART"
      - name: cm-push prerelease to public chartmuseum
        if: env.DRY_RUN == 'false'
        # Secrets via env vars (NOT `${{ }}`-inlined): GH Actions interpolates BEFORE bash
        # parses, so `$`/backtick/`\` in the value would shell-re-expand and silently mangle
        # the password. Env-var expansion (`"$VAR"`) is single-pass and safe.
        env:
          CHARTMUSEUM_USERNAME: ${{ secrets.CHARTMUSEUM_USERNAME }}
          CHARTMUSEUM_PASSWORD: ${{ secrets.CHARTMUSEUM_PASSWORD }}
          CHARTMUSEUM_URL:      ${{ secrets.CHARTMUSEUM_URL }}
        run: |
          helm cm-push \
            --username "$CHARTMUSEUM_USERNAME" \
            --password "$CHARTMUSEUM_PASSWORD" \
            "$CHART" "$CHARTMUSEUM_URL"

  # Release: plain cm-push of whatever's in Chart.yaml (no rewriting).
  push_to_public:
    needs: push_prerelease_to_public
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      options: --user 0:0   # root — avoids /__w/_temp EACCES (runner fsGroup 1001 ≠ image user)
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    env:
      CHART: stable/${{ inputs.chart }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - name: helm deps update
        run: helm dependencies update --skip-refresh "$CHART"
      - name: cm-push release to public chartmuseum
        if: env.DRY_RUN == 'false'
        # See `cm-push prerelease to public chartmuseum` above for the env-var-vs-inlining rationale.
        env:
          CHARTMUSEUM_USERNAME: ${{ secrets.CHARTMUSEUM_USERNAME }}
          CHARTMUSEUM_PASSWORD: ${{ secrets.CHARTMUSEUM_PASSWORD }}
          CHARTMUSEUM_URL:      ${{ secrets.CHARTMUSEUM_URL }}
        run: |
          helm cm-push \
            --username "$CHARTMUSEUM_USERNAME" \
            --password "$CHARTMUSEUM_PASSWORD" \
            "$CHART" "$CHARTMUSEUM_URL"
