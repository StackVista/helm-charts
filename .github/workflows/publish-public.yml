# Publish Public
#
# Manual workflow for pushing `suse-observability-agent` and `suse-observability-values` to the
# public chartmuseum (`CHARTMUSEUM_URL` — distinct from the `_INTERNAL_` chartmuseum used by
# publish-internal.yml). The main `suse-observability` chart is intentionally absent from the
# choice list — it is a licensed product distributed only through the internal chartmuseum
# (see publish-internal.yml). Only the public-facing helper charts go here.
#
# Trigger: workflow_dispatch only, with `chart` (choice) and `dry_run` (boolean, default true)
# inputs. Operator must explicitly uncheck `dry_run` to publish for real.
# Gating: step-level via `env.DRY_RUN`. Setup (checkout, helm repos config, helm deps update)
# runs unconditionally; only the destructive steps (modify_chart_to_prerelease_version,
# cm-push) are skipped when DRY_RUN=true. At cutover, flip the env-block literal `'true'` →
# `'false'` — but since this workflow is dispatch-only there's no push event to differ on, so
# leaving it `'true'` simply means manual dispatches stay safe-by-default forever (the operator
# always opts in by unchecking `dry_run`). Keep the env-block literal flip for consistency with
# publish-internal.yml.
#
# GitLab equivalent: replaces the `push_prerelease_charts_to_public_jobs` and
# `push_charts_to_public_jobs` job families generated by `.gitlab-ci.jsonnet`. GitLab had one job
# per chart; the GitHub side parametrises over a single `chart` input instead. Each GitLab job
# has `before_script: helm_fetch_dependencies` (helm repo add + update) which we mirror in the
# `Configure helm repos` step.
name: Publish Public

on:
  workflow_dispatch:
    inputs:
      chart:
        description: Chart to publish
        type: choice
        required: true
        options:
          - suse-observability-agent
          - suse-observability-values
      dry_run:
        description: "Skip destructive publish steps (modify-chart-version, cm-push)"
        type: boolean
        default: true

env:
  # workflow_dispatch is the only trigger here, so always honor inputs.dry_run.
  # GH-expression gotcha: STRING 'false' is truthy, BOOLEAN false is falsy — hence the
  # `(inputs.dry_run && 'true' || 'false')` coercion.
  DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}

jobs:
  # What: rewrites the chart's version to a `-pre.N` prerelease suffix via
  # `modify_chart_to_prerelease_version.sh`, then `helm cm-push`es to the public chartmuseum.
  # Why: makes the prerelease build of the chart available to downstream consumers before the
  # release version ships.
  # GitLab equivalent: `push_prerelease_<chart>_to_public` jobs generated by
  # `push_prerelease_charts_to_public_jobs` in `.gitlab-ci.jsonnet`.
  push_prerelease_to_public:
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    env:
      CHART: stable/${{ inputs.chart }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - name: helm deps update
        # Always run — writes only to local charts/ + Chart.lock; exercises helm repo auth.
        run: |
          helm dependencies update --skip-refresh "$CHART"
      - name: Rewrite Chart.yaml to prerelease version
        # Mutates Chart.yaml; only meaningful followed by the cm-push, so gated together.
        if: env.DRY_RUN == 'false'
        run: |
          ./scripts/ci/modify_chart_to_prerelease_version.sh "$CHART"
      - name: cm-push prerelease to public chartmuseum
        if: env.DRY_RUN == 'false'
        run: |
          helm cm-push \
            --username "${{ secrets.CHARTMUSEUM_USERNAME }}" \
            --password "${{ secrets.CHARTMUSEUM_PASSWORD }}" \
            "$CHART" "${{ secrets.CHARTMUSEUM_URL }}"

  # What: plain `helm cm-push` of the release version of the chart to the public chartmuseum (no
  # version rewriting; whatever is in `Chart.yaml` is what ships).
  # Why: ships the official release after the prerelease step succeeded.
  # GitLab equivalent: `push_<chart>_to_public` jobs generated by `push_charts_to_public_jobs` in
  # `.gitlab-ci.jsonnet`. The `needs: push_prerelease_to_public` mirrors GitLab's
  # `needs: ['push_prerelease_<chart>_to_public']`.
  push_to_public:
    needs: push_prerelease_to_public
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    env:
      CHART: stable/${{ inputs.chart }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - name: helm deps update
        # Always run — writes only to local charts/ + Chart.lock; exercises helm repo auth.
        run: |
          helm dependencies update --skip-refresh "$CHART"
      - name: cm-push release to public chartmuseum
        if: env.DRY_RUN == 'false'
        run: |
          helm cm-push \
            --username "${{ secrets.CHARTMUSEUM_USERNAME }}" \
            --password "${{ secrets.CHARTMUSEUM_PASSWORD }}" \
            "$CHART" "${{ secrets.CHARTMUSEUM_URL }}"
