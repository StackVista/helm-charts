# Publish
#
# Auto-publishes affected charts to the internal chartmuseum. Fires on push to `master` and on
# chart-version tags (`*/*.*.*`, e.g. `suse-observability/1.2.3`); also exposes a manual dispatch
# button for re-runs.
#
# Gating: the `push_to_internal` job is gated on `vars.PUBLISH_ENABLED == 'true'`. During
# parallel-run (PUBLISH_ENABLED=false) only that final job is skipped — `detect_changes` and
# `build_stable` still run so a build artifact exists if the gate later flips. The job also
# carries a `[skip ci]` commit-message guard so that the suse-observability auto-tag /
# version-bump push from its own after-script does not re-enter this workflow.
#
# GitLab equivalent: replaces the `push-charts-to-internal` stage of the GitLab pipeline,
# including the special-case extra scripts for `suse-observability` (set-release-version on tag,
# tag + pre-release bump on master). Note `vars.PUBLISH_ENABLED` is read at job level (`if:`);
# step-level steps use the env-promoted `${{ env.X }}` form elsewhere.
name: Publish

on:
  push:
    branches: [master]
    tags: ['*/*.*.*']
  workflow_dispatch: {}

jobs:
  # What: composite-action wrapper that produces the per-chart matrix (stable + local) by
  # diffing the current ref against its base.
  # Why: replaces GitLab's per-job `rules: changes:` distributed filtering with a single up-front
  # diff job whose outputs drive downstream matrices.
  # GitLab equivalent: no direct equivalent — GitLab inferred per-job filtering inline. New on
  # the GitHub side. Identical to ci.yml's `detect_changes` job (each workflow has its own job graph so
  # the action is invoked independently).
  detect_changes:
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    outputs:
      stable: ${{ steps.d.outputs.stable }}
      local: ${{ steps.d.outputs.local }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: d
        uses: ./.github/actions/detect-changes

  # What: builds helm dependencies and packages each affected stable chart, uploading the
  # resulting `charts/` + `build/` trees as a `build-<chart>` artifact for downstream consumption.
  # Why: produces the .tgz that `push_to_internal` ships to chartmuseum.
  # GitLab equivalent: `build_<chart>` jobs generated by `build_chart_job(chart)` in
  # `.gitlab-ci.jsonnet`. Same job is reused (duplicated) in ci.yml; here it exists so
  # `push_to_internal` has an artifact when the publish gate is enabled.
  build_stable:
    needs: detect_changes
    if: needs.detect_changes.outputs.stable != '[]'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-helm-test-4423bdaa
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.stable) }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure helm repos and fetch deps
        run: |
          helm repo add deliveryhero    https://charts.deliveryhero.io
          helm repo add opentelemetry   https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add stackstate      https://helm.stackstate.io
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo update
      - name: Build 2nd-degree file:// deps
        run: |
          yq e '.dependencies[] | select (.repository == "file*").repository | sub("^file://","")' \
            stable/${{ matrix.chart }}/Chart.yaml \
            | xargs -I % helm dependencies build --skip-refresh stable/${{ matrix.chart }}/%
      - name: Build chart
        run: |
          helm dependencies build stable/${{ matrix.chart }}
          mkdir -p stable/${{ matrix.chart }}/build
          helm package --destination stable/${{ matrix.chart }}/build stable/${{ matrix.chart }}
      - uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.chart }}
          path: |
            stable/${{ matrix.chart }}/charts/
            stable/${{ matrix.chart }}/build/

  # What: pushes each built chart to the internal chartmuseum via `helm cm-push`. For
  # `suse-observability` specifically: on tag push, `set_chart_release_version.sh` rewrites the
  # version BEFORE the push; on master push, `tag_sts_chart_pre_release.sh` and
  # `bump_suse_chart_pre_master_version.sh` run AFTER the push to tag + bump pre-release versions.
  # Why: the chartmuseum is the source of truth for internal chart distribution; the
  # suse-observability extras keep its versioning automation in sync.
  # GitLab equivalent: `push_<chart>_to_internal` jobs generated by `push_charts_to_internal_jobs`
  # in `.gitlab-ci.jsonnet`, including the special-case extras for `suse-observability`. The
  # `BRANCHES: master` env satisfies `push_{tag,changes}_skip_ci`'s `for branch in $BRANCHES`
  # loop in `scripts/ci/util.sh` (GitLab inferred this dynamically from `git for-each-ref`; on
  # GitHub we know we're on master because the workflow `on:` filter restricts it).
  push_to_internal:
    needs: [detect_changes, build_stable]
    if: |
      vars.PUBLISH_ENABLED == 'true' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      needs.detect_changes.outputs.stable != '[]'
    runs-on: docker
    container:
      image: ${{ vars.REGISTRY_QUAY_URL }}/stackstate/sts-ci-images:stackstate-devops-d4e06284
      # Run as root inside the container — avoids EACCES on /__w/_temp where
      # actions/checkout writes state (runner pod fsGroup 1001 ≠ image's default user).
      options: --user 0:0
      credentials:
        username: ${{ vars.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect_changes.outputs.stable) }}
    env:
      CHART: stable/${{ matrix.chart }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          name: build-${{ matrix.chart }}
          path: stable/${{ matrix.chart }}/

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: suse-observability — extra before-script (tag path)
        if: matrix.chart == 'suse-observability' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ./scripts/ci/configure_git.sh
          version="${GITHUB_REF_NAME#suse-observability/}"
          ./scripts/ci/set_chart_release_version.sh stable/suse-observability "$version"

      - name: helm deps update + cm-push to internal
        run: |
          helm dependencies update --skip-refresh "$CHART"
          helm cm-push \
            --username "${{ secrets.CHARTMUSEUM_INTERNAL_USERNAME }}" \
            --password "${{ secrets.CHARTMUSEUM_INTERNAL_PASSWORD }}" \
            "$CHART" "${{ secrets.CHARTMUSEUM_INTERNAL_URL }}"

      - name: suse-observability — extra after-script (master path)
        if: matrix.chart == 'suse-observability' && github.ref == 'refs/heads/master'
        env:
          GH_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # tag_sts_chart_pre_release.sh and bump_suse_chart_pre_master_version.sh
          # call push_{tag,changes}_skip_ci, which iterate over $BRANCHES. On master
          # push the only branch we want to push back to is master itself.
          BRANCHES: master
        run: |
          ./scripts/ci/configure_git.sh
          ./scripts/ci/tag_sts_chart_pre_release.sh suse-observability
          ./scripts/ci/bump_suse_chart_pre_master_version.sh stable/suse-observability
