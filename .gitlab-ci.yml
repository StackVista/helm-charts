    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $RUN_UPDATECLI
    - if: $RUN_UPDATECLI_STACKSTATE
    - if: $RUN_UPDATECLI_STACKPACKS
