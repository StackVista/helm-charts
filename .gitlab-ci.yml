    - test -f updatecli/updatecli.d/update-docker-images/update.yaml
    - test -f updatecli/updatecli.d/update-stackstate/update.yaml
    - test -f updatecli/updatecli.d/update-stackpacks/update.yaml
  stage: validate
  variables:
    STACKPACKS_SOURCE_BRANCH: unset
    STACKSTATE_SOURCE_BRANCH: unset
    TARGET_BRANCH: unset
validate_updatecli_diff:
  image: ${REGISTRY_QUAY_URL}/stackstate/sts-ci-images:stackstate-devops-d4e06284
  rules:
    - changes:
        - updatecli/**/*
      if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - export GITLAB_TOKEN="$HELM_CHARTS_PAT"
    - updatecli pipeline diff --config updatecli/updatecli.d/update-docker-images/ --values updatecli/values.d/values.yaml
    - updatecli pipeline diff --config updatecli/updatecli.d/update-stackstate/ --values updatecli/values.d/values.yaml
    - updatecli pipeline diff --config updatecli/updatecli.d/update-stackpacks/ --values updatecli/values.d/values.yaml
  stage: validate
  variables:
    STACKPACKS_SOURCE_BRANCH: master
    STACKSTATE_SOURCE_BRANCH: master
    TARGET_BRANCH: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
