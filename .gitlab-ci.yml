  before_script:
    - .gitlab/configure_git.sh
    - export GITLAB_TOKEN="$HELM_CHARTS_PAT"
    - export UPDATE_CLI_PGP_KEY="$(cat $STACKSTATE_SYSTEM_USER_PGP_KEY)"
    - export UPDATE_CLI_PGP_PASSPHRASE="$STACKSTATE_SYSTEM_USER_PGP_PASS_PHRASE"
  image: ${REGISTRY_QUAY_URL}/stackstate/sts-ci-images:stackstate-devops-d4e06284
  rules:
    - if: $RUN_UPDATECLI
      when: always
    - when: never
  script:
    - updatecli pipeline apply -c updatecli/updatecli.d/update-docker-images/ -v updatecli/values.d/values.yaml
  stage: update
  variables:
    STACKPACKS_SOURCE_BRANCH: unset
    STACKSTATE_SOURCE_BRANCH: unset
    TARGET_BRANCH: unset
    UPDATECLI_BRANCH: updatecli-${TARGET_BRANCH}-docker-images
